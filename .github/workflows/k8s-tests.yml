name: K8s tests

# Validates deploy/k8s/data-worker/ and exercises the api-worker's
# scale-up / scale-down activities against a real (kind) cluster — the
# k8s surface the unit tests mock away (manifest validity, the actual
# patch to a Deployment's .spec.replicas, kubeconfig handling).
#
# `kind` and `kubectl` are preinstalled on the GitHub `ubuntu-latest`
# runner image, so no setup actions are needed. The kind cluster is
# torn down with the runner at job end.

# Only when the k8s manifests, the scaling activities, or this workflow
# change — a doc-only PR shouldn't spin up a kind cluster.
on:
  push:
    branches: [main]
    paths:
      - 'deploy/k8s/**'
      - 'services/fishsense-api-workflow-worker/src/fishsense_api_workflow_worker/activities/k8s_scaling.py'
      - 'services/fishsense-api-workflow-worker/src/fishsense_api_workflow_worker/activities/ensure_data_worker_running_activity.py'
      - 'services/fishsense-api-workflow-worker/src/fishsense_api_workflow_worker/activities/scale_down_data_worker_if_idle_activity.py'
      - 'services/fishsense-api-workflow-worker/tests/test_k8s_scaling*.py'
      # Dep/marker changes (e.g. the `kubernetes` client) affect the
      # scaling activities even when no .py file changes.
      - 'services/fishsense-api-workflow-worker/pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/k8s-tests.yml'
  pull_request:
    paths:
      - 'deploy/k8s/**'
      - 'services/fishsense-api-workflow-worker/src/fishsense_api_workflow_worker/activities/k8s_scaling.py'
      - 'services/fishsense-api-workflow-worker/src/fishsense_api_workflow_worker/activities/ensure_data_worker_running_activity.py'
      - 'services/fishsense-api-workflow-worker/src/fishsense_api_workflow_worker/activities/scale_down_data_worker_if_idle_activity.py'
      - 'services/fishsense-api-workflow-worker/tests/test_k8s_scaling*.py'
      # Dep/marker changes (e.g. the `kubernetes` client) affect the
      # scaling activities even when no .py file changes.
      - 'services/fishsense-api-workflow-worker/pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/k8s-tests.yml'

jobs:
  data-worker-manifests-and-scaling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Kustomize build (fast check before spinning up a cluster)
        run: kubectl kustomize deploy/k8s/data-worker

      - name: Create kind cluster
        run: |
          kind create cluster --wait 120s
          # `kind create cluster` writes the kubeconfig + sets the
          # current context here; expose the path to the pytest step.
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"
          # The kustomization pins `namespace: e4e-fishsense`, so the
          # ephemeral cluster must have it before the Secrets + apply.
          kubectl create namespace e4e-fishsense

      - name: Create stub Secrets the Deployment references
        # Real values don't matter — we never wait for the pod to be Ready;
        # this just lets `kubectl apply -k` resolve the secretKeyRefs so the
        # apply is a faithful server-side validation. Secrets go in the
        # pinned namespace so the secretKeyRefs resolve. No ghcr-pull stub —
        # the Deployment has no imagePullSecrets (the GHCR image is public).
        run: |
          kubectl create secret generic fishsense-data-worker-secrets -n e4e-fishsense \
            --from-literal=fishsense_api_username=ci \
            --from-literal=fishsense_api_password=ci \
            --from-literal=object_store_access_key=ci \
            --from-literal=object_store_secret_key=ci
          kubectl create secret generic fishsense-data-worker-temporal-certs -n e4e-fishsense \
            --from-literal=client.pem=ci \
            --from-literal=client.key=ci \
            --from-literal=root-ca.pem=ci

      - name: Apply the data-worker manifests (server-side validation)
        run: |
          kubectl apply -k deploy/k8s/data-worker
          kubectl get deployment fishsense-data-processing-workflow-worker -n e4e-fishsense -o yaml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Setup uv + sync (cached, retried)
        uses: ./.github/actions/setup-uv-sync
        with:
          args: --all-packages --all-groups

      - name: Run the k8s scaling integration tests
        # KUBECONFIG (set above) points pytest at the kind cluster.
        # K8S_NAMESPACE matches the namespace the kustomization pins, so
        # the scaling test finds the Deployment it just applied.
        env:
          K8S_NAMESPACE: e4e-fishsense
        run: uv run --directory services/fishsense-api-workflow-worker pytest -v -m k8s
