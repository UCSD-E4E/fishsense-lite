name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}

  # Cascade an SDK release into bumps of every consuming worker.
  #
  # The SDK is a workspace dep (`fishsense-api-sdk = { workspace = true }`),
  # so consumers' Docker images don't get rebuilt automatically when the
  # SDK changes — release-please only bumps a package whose own path was
  # touched. Without this job, an SDK fix would land on main but never
  # reach the running workers, because the workers' compose pins still
  # point at images built before the fix.
  #
  # Trigger: release-please reports `libs/fishsense-api-sdk` in
  # `paths_released`. We then read the new SDK version from the manifest,
  # update each consumer's `pyproject.toml` `>=X.Y.Z` pin, and open a PR.
  # The PR's commit messages are conventional-commit-scoped per consumer
  # (`fix(api-workflow-worker): ...`) so release-please picks them up on
  # the next run and bumps the workers, which then go through the
  # promote → auto-deploy chain.
  #
  # release-please does NOT have a built-in Python-workspace-aware plugin
  # (unlike `node-workspace` / `cargo-workspace`), which is why this is a
  # follow-up job rather than a `release-please-config.json` setting.
  auto-bump-sdk-consumers:
    needs: release-please
    if: |
      needs.release-please.outputs.releases_created == 'true'
      && contains(needs.release-please.outputs.paths_released, 'libs/fishsense-api-sdk')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Read released SDK version
        id: sdk
        run: |
          version=$(jq -r '."libs/fishsense-api-sdk"' .release-please-manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Each consumer pyproject.toml has a `"fishsense-api-sdk>=X.Y.Z"`
      # pin in its `dependencies` block. Replace the version specifier
      # in-place. Iterating the explicit list (rather than grep -l) keeps
      # the surface area obvious — adding a new consumer is one line here
      # plus the corresponding pin in their pyproject.
      - name: Update consumer pins
        run: |
          set -euo pipefail
          for pkg in \
            services/fishsense-api-workflow-worker \
            services/fishsense-data-processing-workflow-worker \
          ; do
            sed -i -E \
              "s|\"fishsense-api-sdk[^\"]*\"|\"fishsense-api-sdk>=${{ steps.sdk.outputs.version }}\"|" \
              "$pkg/pyproject.toml"
          done

      - name: Open consumer-bump PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: auto-bump/fishsense-api-sdk-${{ steps.sdk.outputs.version }}
          base: main
          delete-branch: true
          title: "fix(consumers): pin fishsense-api-sdk>=${{ steps.sdk.outputs.version }}"
          body: |
            Auto-generated by `.github/workflows/release.yml` after
            release-please cut **fishsense-api-sdk@${{ steps.sdk.outputs.version }}**.

            Bumps the `>=X.Y.Z` pin in each SDK-consuming worker's
            `pyproject.toml`. Merging this PR causes release-please to
            bump the workers on its next run, which triggers the
            promote → auto-deploy chain so the running workers actually
            pick up the new SDK code.

            Without this PR, an SDK release would land on main but never
            reach the workers in prod (their compose pins point at
            images built before the SDK fix).
          # Single `fix:` commit touching every consumer pyproject.
          # release-please tracks file paths against each package, so a
          # single commit that modifies both workers' pyprojects bumps
          # both packages on the next release cycle. Scope is generic
          # (`deps`) since a per-package scope would be misleading on
          # whichever package's CHANGELOG it landed in second.
          commit-message: |
            fix(deps): pin fishsense-api-sdk>=${{ steps.sdk.outputs.version }}

            Auto-generated by release.yml after fishsense-api-sdk@${{ steps.sdk.outputs.version }}
            was released. Bumps every consuming worker's `>=X.Y.Z` pin
            so release-please cuts a patch release for each, which then
            triggers the promote -> auto-deploy chain.
          labels: |
            auto
            sdk-bump

  # Keep uv.lock's workspace-member versions in step with the pyproject
  # versions release-please just bumped.
  #
  # release-please rewrites each released package's `version` in its own
  # pyproject.toml but knows nothing about uv.lock, which separately records
  # a version for every workspace member. So every release leaves the lock
  # behind. By 2026-07-21 four members had drifted at once (fishsense-api
  # 1.29.1 vs 1.30.2, api-workflow-worker 1.39.0 vs 1.42.0,
  # data-processing-workflow-worker 2.7.1 vs 2.7.6, sdk 1.36.1 vs 1.37.0).
  #
  # This never showed up as a red build, which is exactly why it accumulated:
  # the service Dockerfiles run `uv sync --frozen`, which consumes the lock
  # as-is WITHOUT checking that it still matches the pyprojects (`--locked`
  # is the flag that checks). The real failure mode is quieter than a broken
  # build — a dependency newly added to a pyproject is simply absent from the
  # lock, so the image ships without it and fails at import time.
  #
  # A `uv lock --check` gate in CI is the WRONG fix here: release-please's own
  # release PR bumps pyproject versions without touching the lock, so such a
  # gate would red-X every release PR by construction. Refreshing right after
  # the release keeps main convergent without fighting the release flow.
  refresh-uv-lock:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Only the workspace members' own `version` lines move: no third-party
      # constraint changed, so uv keeps the rest of the resolution as-is.
      - name: Refresh lockfile
        run: uv lock

      # No-ops when the lock was already in step — create-pull-request opens
      # nothing on a clean tree.
      - name: Open lockfile-refresh PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: auto-lock/uv-refresh
          base: main
          delete-branch: true
          title: "chore(deps): refresh uv.lock after release"
          commit-message: |
            chore(deps): refresh uv.lock after release

            Auto-generated by release.yml. Realigns uv.lock's workspace-member
            versions with the pyproject versions release-please just bumped.
          body: |
            Auto-generated by `.github/workflows/release.yml` after
            release-please cut a release.

            `uv.lock` records a version for every workspace member, but
            release-please only rewrites each package's own `pyproject.toml`.
            Without this the lock drifts further every release.

            The drift does not break builds — the Dockerfiles use
            `uv sync --frozen`, which does not verify the lock against the
            pyprojects — so it fails quietly instead: a dependency newly added
            to a pyproject would be missing from the lock and therefore absent
            from the built image.

            Expect this diff to contain only workspace-member `version` lines.
          labels: |
            auto
            deps
