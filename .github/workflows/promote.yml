name: Promote

# Fires when release-please publishes a release. Two side effects:
#
# 1. Promotes the SHA-tagged GHCR image (built by build.yml) to
#    `:v<version>` + `:latest`. Manifest-only retag — no rebuild — so
#    the image bound to the release tag is exactly the one built from
#    the release commit, regardless of any newer commits that landed.
#
# 2. Opens a deploy PR bumping the package's image pin. Merging it
#    triggers deploy.yml. For the orchestrator-stack services that's a
#    bump to `deploy/compose*.yml` -> `docker compose pull && up -d` on
#    the `fishsense-prod` self-hosted runner. For the data-processing
#    worker (which now runs on NRP/Kubernetes, not a self-hosted host)
#    it's a bump to the `newTag:` in
#    `deploy/k8s/data-worker/kustomization.yaml` -> `kubectl apply -k`
#    from a GitHub-hosted runner. Either way the deploy is intentional
#    — humans review the diff before prod changes.

on:
  release:
    types: [published]

permissions:
  contents: write       # peter-evans/create-pull-request: push branch
  pull-requests: write  # peter-evans/create-pull-request: open PR
  packages: write       # promote image manifests in GHCR

env:
  REGISTRY: ghcr.io

jobs:
  promote-and-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse package + version + SHA from release tag
        id: parse
        env:
          TAG: ${{ github.event.release.tag_name }}
          FULL_SHA: ${{ github.event.release.target_commitish }}
        run: |
          # release-please tag format with `include-component-in-tag: true`:
          #   <package-name>-v<version>   e.g. fishsense-api-v1.18.2
          package="${TAG%-v*}"
          version="v${TAG##*-v}"
          short_sha="$(echo "$FULL_SHA" | cut -c1-7)"

          # `promotable` controls the GHCR image retag step.
          # `deployable` controls whether we open a compose-pin PR.
          case "$package" in
            fishsense-api|fishsense-api-workflow-worker|fishsense-backup-worker|fishsense-data-processing-workflow-worker|fishsense-lite-web)
              promotable=true
              deployable=true
              ;;
            *)
              # Pure-library packages (fishsense-shared, fishsense-api-sdk):
              # no image at all.
              echo "::notice::no deployable image for $package; skipping"
              promotable=false
              deployable=false
              ;;
          esac

          echo "package=$package" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "promotable=$promotable" >> "$GITHUB_OUTPUT"
          echo "deployable=$deployable" >> "$GITHUB_OUTPUT"

      - name: Compute image base name (lowercased owner)
        id: img
        if: steps.parse.outputs.promotable == 'true'
        run: |
          owner_lc="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=${{ env.REGISTRY }}/${owner_lc}/${{ steps.parse.outputs.package }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.parse.outputs.promotable == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for build.yml's SHA-tagged image (race guard)
        if: steps.parse.outputs.promotable == 'true'
        env:
          SRC: ${{ steps.img.outputs.name }}:sha-${{ steps.parse.outputs.short_sha }}
        run: |
          # build.yml is triggered by the same merge commit's push event
          # and runs in parallel with release-please. Poll up to 20 min
          # for the SHA-tagged image to land before promoting.
          for i in $(seq 1 40); do
            if docker buildx imagetools inspect "$SRC" >/dev/null 2>&1; then
              echo "found: $SRC"
              exit 0
            fi
            echo "[$i/40] $SRC not ready yet; sleeping 30s"
            sleep 30
          done
          echo "::error::source image $SRC never appeared. build.yml probably failed for this commit; rerun build, then rerun this Promote."
          exit 1

      - name: Promote SHA-tagged image to v<version> + latest
        if: steps.parse.outputs.promotable == 'true'
        env:
          SRC: ${{ steps.img.outputs.name }}:sha-${{ steps.parse.outputs.short_sha }}
          DST_VERSION: ${{ steps.img.outputs.name }}:${{ steps.parse.outputs.version }}
          DST_LATEST: ${{ steps.img.outputs.name }}:latest
        run: |
          docker buildx imagetools create \
            -t "$DST_VERSION" \
            -t "$DST_LATEST" \
            "$SRC"
          echo "promoted $SRC -> $DST_VERSION and $DST_LATEST"

      - name: Bump image pin (compose for orchestrator stack, kustomize for the NRP data-worker)
        if: steps.parse.outputs.deployable == 'true'
        id: bump
        env:
          PKG: ${{ steps.parse.outputs.package }}
          NEW_VER: ${{ steps.parse.outputs.version }}
        run: |
          set -e
          owner_lc="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"

          if [ "$PKG" = "fishsense-data-processing-workflow-worker" ]; then
            # The data-worker runs on NRP/Kubernetes — bump the image
            # `newTag:` in deploy/k8s/data-worker/kustomization.yaml.
            kfile="deploy/k8s/data-worker/kustomization.yaml"
            if [ ! -f "$kfile" ]; then
              echo "::error::$kfile not found"
              exit 1
            fi
            sed -i -E "s|^(\s*newTag:\s*)v[0-9]+\.[0-9]+\.[0-9]+\s*$|\1${NEW_VER}|" "$kfile"
            echo "updated: $kfile"
            if git diff --quiet -- "$kfile"; then
              echo "::notice::$kfile already pinned to ${NEW_VER}; no PR"
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # Orchestrator-stack services: bump the `image: ...:vX.Y.Z`
          # pin wherever it lives (compose.yml or any include:d file).
          pin_re="image: ${{ env.REGISTRY }}/${owner_lc}/${PKG}:v[0-9]+\.[0-9]+\.[0-9]+"
          files="$(grep -lE "$pin_re" deploy/compose*.yml 2>/dev/null || true)"

          if [ -z "$files" ]; then
            echo "::notice::no compose pin found for $PKG; PR will not be opened. Add a service stanza to deploy/compose*.yml first if you want auto-rollout."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for f in $files; do
            sed -i -E "s|(image: ${{ env.REGISTRY }}/${owner_lc}/${PKG}:)v[0-9]+\.[0-9]+\.[0-9]+|\1${NEW_VER}|g" "$f"
            echo "updated: $f"
          done
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open deploy PR
        if: steps.parse.outputs.deployable == 'true' && steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          # deploy.yml keys off this branch prefix to know it's an
          # auto-deploy PR vs. an unrelated edit to a compose file.
          branch: auto-deploy/${{ steps.parse.outputs.package }}-${{ steps.parse.outputs.version }}
          base: main
          delete-branch: true
          title: "chore(deploy): bump ${{ steps.parse.outputs.package }} to ${{ steps.parse.outputs.version }}"
          body: |
            Auto-generated by `.github/workflows/promote.yml` on
            release ${{ github.event.release.html_url }}.

            - **Package**: `${{ steps.parse.outputs.package }}`
            - **Version**: `${{ steps.parse.outputs.version }}`
            - **Image**: `${{ steps.img.outputs.name }}:${{ steps.parse.outputs.version }}`
            - **Source SHA**: `${{ steps.parse.outputs.short_sha }}`

            Merging this PR triggers `.github/workflows/deploy.yml` —
            `docker compose pull && up -d` on the `fishsense-prod`
            self-hosted runner for the orchestrator stack, or
            `kubectl apply -k deploy/k8s/data-worker` from a
            GitHub-hosted runner (NRP) for the data-processing worker.
          commit-message: "chore(deploy): bump ${{ steps.parse.outputs.package }} to ${{ steps.parse.outputs.version }}"
          labels: |
            deploy
            auto
