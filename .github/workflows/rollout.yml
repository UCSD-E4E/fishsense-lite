name: Rollout

# Runs `docker compose pull && up -d` on the prod orchestrator host
# after a deploy.yml-generated PR is merged. Intentional gate: a human
# reviews the version-pin diff and merges, then this fires.
#
# Prereq: a self-hosted runner registered with the `fishsense-prod`
# label, co-located with the docker engine that runs deploy/compose.yml.
# Until that runner exists, jobs created by this workflow sit in queue
# (visible in Actions UI). They pick up automatically when the runner
# comes online.

on:
  pull_request:
    types: [closed]
    branches: [main]
  # Manual re-run (re-pull + recreate without bumping a pin). Useful
  # when a service crash-loops and you just want a clean restart.
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  rollout:
    # Only fire on actual merges of auto-deploy/* branches; manual edits
    # to compose files merging via a non-auto-deploy PR shouldn't trigger
    # an automatic prod recreate.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && startsWith(github.head_ref, 'auto-deploy/'))
    runs-on: [self-hosted, fishsense-prod]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull updated images
        working-directory: deploy
        run: docker compose pull

      - name: Recreate services with changed images
        working-directory: deploy
        run: docker compose up -d --remove-orphans
