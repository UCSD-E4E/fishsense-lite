name: Integration

# Spins up deploy/compose.local.yml on a GitHub-hosted runner (postgres,
# temporal, fishsense-api, garage + its one-shot bootstrap, label-studio)
# and runs `./check.sh integration` against it. Doubles the per-PR
# feedback loop vs. unit-only — flaky tests reveal themselves here, not
# in prod.
#
# Gated on a label + workflow_dispatch (NOT every PR) to avoid burning
# runner minutes on doc-only changes. To run on a PR, add the
# `integration-tests` label. Promote to required-status after a few
# weeks if the flake rate is acceptable.
#
# Always runs on release-please PRs (branch prefix
# `release-please--`) — the next merge cuts a tagged release and
# triggers the promote -> auto-deploy chain, so integration coverage
# is the last gate before a version pin lands in compose.
#
# What's NOT brought up: the `dev` container (heavyweight build, only
# useful for interactive shells) and `temporal-ui` (not exercised by
# tests). Pytest runs on the runner host; tests reach services through
# the published ports (5432, 7233, 8000, 8082, 3900) with the
# FISHSENSE_* / E4EFS_* env-var overrides each test fixture already
# supports for exactly this reason.

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  integration:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'integration-tests') ||
      startsWith(github.event.pull_request.head.ref, 'release-please--')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Stub deploy/.env
        # compose.local.yml uses ${VAR:?...} interpolation for the dev
        # service's HOST_REPO_PATH and DOCKER_GID — compose parses the
        # whole file even when we only `up` a subset of services, so
        # both must be set or compose bails before the stack starts.
        run: |
          cat > deploy/.env <<EOF
          HOST_REPO_PATH=${{ github.workspace }}
          DOCKER_GID=999
          POSTGRES_PASSWORD=fishsense_local
          TEMPORAL_DB_PWD=temporal_local
          FISHSENSE_DB_NAME=fishsense
          EOF

      - name: Bring up local stack
        working-directory: deploy
        run: |
          docker compose -f compose.local.yml up -d --wait \
            postgres temporal fishsense-api garage label-studio
          # Garage is up + healthy; run the one-shot bootstrap (assign
          # layout, create the `fishsense` bucket, import the fixed test
          # key) and block until it completes before tests run. `--build`
          # builds the tiny alpine+garage init image.
          docker compose -f compose.local.yml run --rm --build garage-init
          # fishsense-lite-web has no healthcheck (SSR renders depend on
          # fishsense-api + label-studio being warm), so bring it up
          # without --wait. The smoke step at the end of this job
          # retry-loops until / returns the dashboard title.
          docker compose -f compose.local.yml up -d fishsense-lite-web
        # --wait blocks on each service's healthcheck. label-studio's
        # start_period is 60s on a cold image; first run after a cache
        # miss can take ~90s before --wait returns.

      - name: Install postgresql-client-17
        # The backup-worker pg_dump integration test shells out to the
        # host's pg_dump / pg_restore against the postgres:17 service
        # in compose.local.yml. ubuntu-24.04 runners come with
        # postgresql-client-16 preinstalled, whose pg_dump refuses to
        # dump a PG17 server ("aborting because of server version
        # mismatch") and whose pg_restore can't read a PG17-format
        # archive ("unsupported version (1.16) in file header").
        #
        # Pulling pg17 from PGDG lands binaries at
        # /usr/lib/postgresql/17/bin/, but /usr/bin/pg_dump still
        # resolves to v16 (pg_wrapper picks the alphabetically-first
        # match, not the highest). Prepend the v17 bindir to PATH for
        # the rest of the job so both pg_dump and pg_restore resolve
        # to v17. Bump if compose.local.yml's postgres image moves
        # past 17.
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/17/bin/pg_dump --version
          /usr/lib/postgresql/17/bin/pg_restore --version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Sync workspace (all packages, all groups)
        run: uv sync --all-packages --all-groups

      # Node + npm install must precede `./check.sh integration` because
      # check.sh's run_npm_integration step calls `npm run test:integration`
      # in apps/fishsense-lite-web, which needs node_modules (vitest) on
      # disk. Without these steps it fails with `vitest: not found` (exit 127).
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: apps/fishsense-lite-web/package-lock.json

      - name: Install fishsense-lite-web deps
        working-directory: apps/fishsense-lite-web
        run: npm ci --no-audit --no-fund

      - name: Alias `garage` to loopback for host-side S3 clients
        # The object-store endpoint (below) is `http://garage:3900` so the Label
        # Studio *container* can reach it via docker DNS. This maps the same name
        # to the host's published :3900 port so the pytest/worker S3 clients that
        # run on the runner host resolve it too — one endpoint string that works
        # from both sides. See tests/_object_store_itest.py + populate_utils.
        run: echo "127.0.0.1 garage" | sudo tee -a /etc/hosts

      - name: Run integration suite
        env:
          # Map the docker-internal hostnames the test fixtures fall
          # back to (`temporal`, `static_file_server`, etc.) onto
          # localhost-published ports. Each integration-test module's
          # `_temporal_target` / `_exchange_url` etc. helpers read these
          # before defaulting to the in-cluster name.
          FISHSENSE_TEMPORAL_HOST: localhost
          FISHSENSE_TEMPORAL_PORT: "7233"
          FISHSENSE_API_URL: http://localhost:8000
          FISHSENSE_POSTGRES_HOST: localhost
          FISHSENSE_POSTGRES_PORT: "5432"
          FISHSENSE_POSTGRES_USER: postgres
          FISHSENSE_POSTGRES_PASSWORD: fishsense_local
          FISHSENSE_POSTGRES_DB: fishsense
          # E4EFS_-prefixed equivalents for any test that imports a
          # worker activity module (Dynaconf eager-validates every
          # required setting on first attribute access — see
          # CLAUDE.md "Worker config validation gotcha").
          E4EFS_LABEL_STUDIO__URL: http://localhost:8082
          E4EFS_LABEL_STUDIO__API_KEY: fishsense_local_test_token_42
          # Garage object store. Use the docker-network name `garage:3900`, NOT
          # `localhost:3900`: this endpoint is handed to the Label Studio
          # *container* (populate_utils.ensure_label_studio_s3_storage passes it
          # as the storage `s3endpoint`, which LS validates with `head_bucket`),
          # and a container can't reach the host's localhost. The "Alias garage to
          # loopback" step above lets the host-side pytest/worker S3 clients
          # resolve the same name to the published :3900 port. Creds match the
          # fixed key garage-init imports.
          E4EFS_OBJECT_STORE__ENDPOINT_URL: http://garage:3900
          E4EFS_OBJECT_STORE__REGION: garage
          E4EFS_OBJECT_STORE__BUCKET: fishsense
          E4EFS_OBJECT_STORE__ACCESS_KEY: GK31c2f3a4b5c6d7e8f9a0b1c2
          E4EFS_OBJECT_STORE__SECRET_KEY: "1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef"
          # Read by apps/fishsense-lite-web/tests/integration/dashboard.integration.test.ts.
          # Container exposes 3000 on the host via compose.local.yml's port mapping.
          FISHSENSE_WEB_URL: http://localhost:3000
        # check.sh integration runs Python pytest -m integration AND
        # vitest run --config vitest.config.integration.ts in
        # apps/fishsense-lite-web. The latter exercises the running
        # fishsense-lite-web container and asserts SSR shape (title,
        # Results/Admin cards, empty-DB collapse of labeling sections).
        run: ./check.sh integration

      - name: Compose logs on failure
        if: failure()
        working-directory: deploy
        run: docker compose -f compose.local.yml logs --tail=300

      - name: Tear down
        if: always()
        working-directory: deploy
        run: docker compose -f compose.local.yml down -v
