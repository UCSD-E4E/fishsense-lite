name: Deploy

# Rolls out a new image after a promote.yml-generated PR is merged.
# Intentional gate: a human reviews the version-pin diff and merges,
# then this fires. Two routes, picked by branch name:
#
#   - auto-deploy/fishsense-data-processing-workflow-worker-*  ->
#     `deploy-data-worker`: a GitHub-hosted runner runs
#     `kubectl apply -k deploy/k8s/data-worker` against NRP using the
#     `NRP_KUBECONFIG` repo secret. The data-worker is a stateless
#     Kubernetes Deployment — the kustomization is self-contained, so
#     there's nothing to bootstrap on the target host.
#     See deploy/k8s/data-worker/README.md.
#
#   - any other auto-deploy/*  -> `deploy-incus`: the fishsense Incus
#     slot's own self-hosted runner starts `fishsense-selfupdate`, which
#     runs
#       nixos-rebuild switch --flake github:UCSD-E4E/fishsense-lite#fishsense --refresh
#     converging the slot onto the committed root flake.nix +
#     deploy/incus/ interior — including the `image:` pins in
#     deploy/incus/compose.yml that the merged PR just bumped.
#     See deploy/incus/README.md.
#
# WHY THE PIN-BUMP PR MERGE IS THE TRIGGER, and not the release-please
# merge: `fishsense-selfupdate` converges the slot to whatever is on
# main. At the moment the release-please PR merges, main's
# deploy/incus/compose.yml still pins the *previous* versions and the
# `:v<new>` images don't exist yet — promote.yml retags them minutes
# later on `release: published`, and only then opens the pin-bump PR.
# Converging any earlier would redeploy the old images. The full chain:
#
#   release-please PR merged to main
#     -> release.yml cuts the GitHub release
#     -> promote.yml retags :sha-<short> to :v<version> + :latest, then
#        opens auto-deploy/<pkg>-<version> bumping the incus pin
#     -> a human merges that PR
#     -> this workflow converges the slot
#
# The converge is a TRIGGER, not a clean CI gate. `fishsense-selfupdate`
# stops the GitHub runner mid-switch and restarts it after, so the job
# starts the unit with `--no-block` (see the step comment) and reports
# success as soon as the converge is *enqueued* — its green means
# "converge fired", never "containers are healthy". The `verify-incus` job
# below is the health signal — a GitHub-hosted, report-only probe that polls
# the public endpoints after the converge. For the ground truth, verify
# on-box with `systemctl status fishsense-selfupdate` + `docker compose ps`.
#
# Prereqs:
#   - incus: nothing to configure here. The `[self-hosted, fishsense]`
#     runner is auto-provisioned and auto-registered by the platform
#     because the tenant flake sets `repo = "UCSD-E4E/fishsense-lite"`
#     (ADR 0022) — there is no runner token to manage. The label is
#     opt-in: jobs that must stay GitHub-hosted (the NRP data-worker
#     deploy below) use `runs-on: ubuntu-latest` and are NEVER given a
#     bare `runs-on: self-hosted`.
#   - data-worker: repo secret `NRP_KUBECONFIG` = a token kubeconfig
#     for the NRP namespace (the same one the api-worker uses to scale
#     the Deployment). NRP tokens expire — rotate it. The namespace,
#     Secrets, etc. are bootstrapped per deploy/k8s/data-worker/README.md.
#
# Until the slot is bootstrapped / `NRP_KUBECONFIG` exists, the matching
# job fails (or sits in queue) — visible in the Actions UI.

on:
  pull_request:
    types: [closed]
    branches: [main]
  # Manual re-deploy without bumping a pin — handy after a crash-loop, a
  # kubeconfig rotation, or to converge a config-only change under
  # deploy/incus/ that promote.yml never touches.
  workflow_dispatch:
    inputs:
      target:
        description: "Which target to redeploy"
        required: true
        type: choice
        default: incus
        options:
          - incus
          - data-worker

# Least privilege, granted per job (CodeQL actions/missing-workflow-permissions).
# The incus job never touches the GitHub API nor checks out code, so it
# gets no token scopes at all.
permissions: {}

jobs:
  deploy-incus:
    # Fires on:
    #   - merge of an auto-deploy/* PR that is NOT the data-worker
    #   - manual workflow_dispatch with target=incus
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.target == 'incus') ||
      (github.event.pull_request.merged == true &&
       startsWith(github.head_ref, 'auto-deploy/') &&
       !startsWith(github.head_ref, 'auto-deploy/fishsense-data-processing-workflow-worker-'))
    runs-on: [self-hosted, fishsense] # the label the platform sets on our runner
    permissions: {}
    # Two packages released together (e.g. api + web) produce two pin-bump
    # PRs and therefore two converges. Queue them rather than cancelling:
    # a cancelled converge would leave the slot on the older main, and the
    # surviving run would have started `nixos-rebuild` before the second
    # pin landed.
    concurrency:
      group: deploy-incus
      cancel-in-progress: false
    steps:
      - name: Converge the instance
        # --no-block: enqueue the converge and return 0 immediately, rather
        # than blocking on the oneshot. `fishsense-selfupdate`'s first action
        # is `systemctl stop github-runner-fishsense` — it restarts the very
        # runner executing this job. A blocking `systemctl start` is therefore
        # SIGINT'd (exit 130, false red) whenever `nixos-rebuild` outlives the
        # runner's graceful-stop window; a fast converge finishes inside the
        # window and passes, so the same command reports non-deterministic
        # red/green (observed: PR #238 red at ~6min, #240 green at 34s, same
        # code). This job can only honestly assert "converge fired" anyway —
        # its exit 0 never meant the containers came up healthy (see header).
        # Convergence health belongs in a separate post-converge probe.
        run: systemctl start --no-block fishsense-selfupdate # polkit-authorized on the slot

  verify-incus:
    # Report-only post-converge health probe — the "separate probe" the
    # deploy-incus comment refers to. deploy-incus is --no-block, so its green
    # only means "converge fired"; this turns that into a health signal.
    # GitHub-hosted (ubuntu-latest) on purpose: the slot's runner is restarted
    # mid-`nixos-rebuild`, so a check on it would be interrupted — polling the
    # PUBLIC endpoints from off-box isn't. A miss annotates a warning but does
    # NOT fail the run: the converge is async + the slot is preemptible, so a
    # transient miss isn't a failed deploy (choose the gate variant only if
    # false-reds are acceptable).
    needs: deploy-incus
    if: needs.deploy-incus.result == 'success'
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 15
    steps:
      - name: Poll public endpoints until healthy (or warn)
        run: |
          landing="https://fishsense.e4e.ucsd.edu"
          api="https://api.fishsense.e4e.ucsd.edu"
          # Give nixos-rebuild + `docker compose up -d --force-recreate` time to
          # start, then poll. Healthy = landing serves 200 (edge + web up) and
          # the API route 302s to authentik (fishsense-api + forwardAuth up).
          echo "waiting for the converge to take effect..."
          sleep 60
          l=000; a=000
          for i in $(seq 1 20); do
            l=$(curl -sS -o /dev/null -m 15 -w '%{http_code}' "$landing" 2>/dev/null || echo 000)
            a=$(curl -sS -o /dev/null -m 15 -w '%{http_code}' "$api" 2>/dev/null || echo 000)
            echo "[$i/20] landing=$l api=$a"
            if [ "$l" = "200" ] && [ "$a" = "302" ]; then break; fi
            sleep 30
          done
          if [ "$l" = "200" ] && [ "$a" = "302" ]; then
            echo "### ✅ slot healthy after converge — landing 200, api 302" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=Incus health probe::slot not observed healthy after ~10min (landing=$l expected 200, api=$a expected 302). Converge is async — verify on-box: 'systemctl status fishsense-selfupdate' + 'docker compose ps'. Not failing the run."
            {
              echo "### ⚠️ post-converge health probe: not healthy (report-only)"
              echo "- landing \`$landing\` = \`$l\` (expected 200)"
              echo "- api \`$api\` = \`$a\` (expected 302)"
              echo ""
              echo "The converge is async + the slot is preemptible; verify on-box before treating as a real failure."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy-data-worker:
    # Fires on:
    #   - merge of an auto-deploy/fishsense-data-processing-workflow-worker-* PR
    #   - manual workflow_dispatch with target=data-worker
    #
    # The data-worker is a stateless Kubernetes Deployment on NRP, so
    # this just runs `kubectl apply -k` against the repo checkout — no
    # persistent ops-managed dir, no docker. The Deployment omits
    # `replicas` (the api-worker owns it), so applying is a no-op
    # rollout when it's scaled to 0 and a single-pod replacement when
    # scaled to N. See deploy/k8s/data-worker/README.md.
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.target == 'data-worker') ||
      (github.event.pull_request.merged == true &&
       startsWith(github.head_ref, 'auto-deploy/fishsense-data-processing-workflow-worker-'))
    runs-on: ubuntu-latest
    permissions:
      contents: read # actions/checkout
    env:
      # NRP issues a token kubeconfig per namespace; this is the same
      # one the api-worker uses to scale the Deployment. Empty when the
      # repo secret isn't set yet (validated below).
      NRP_KUBECONFIG: ${{ secrets.NRP_KUBECONFIG }}
    steps:
      - name: Validate NRP_KUBECONFIG is configured
        run: |
          if [ -z "$NRP_KUBECONFIG" ]; then
            echo "::error::repo secret NRP_KUBECONFIG is not set."
            echo "Set it under Settings -> Secrets and variables -> Actions -> Secrets"
            echo "to a token kubeconfig for the NRP namespace. See"
            echo "deploy/k8s/data-worker/README.md for the bootstrap steps."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Write kubeconfig
        run: |
          mkdir -p "$RUNNER_TEMP/.kube"
          umask 077
          printf '%s' "$NRP_KUBECONFIG" > "$RUNNER_TEMP/.kube/config"
          echo "KUBECONFIG=$RUNNER_TEMP/.kube/config" >> "$GITHUB_ENV"

      - name: Apply data-worker manifests (kubectl is preinstalled on ubuntu-latest)
        run: |
          kubectl version --client
          kubectl apply -k deploy/k8s/data-worker
          kubectl rollout status deployment/fishsense-data-processing-workflow-worker --timeout=5m

      - name: Clean up kubeconfig
        if: always()
        run: rm -f "$RUNNER_TEMP/.kube/config"
