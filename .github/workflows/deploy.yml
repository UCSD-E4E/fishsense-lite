name: Deploy

# Runs `docker compose pull && up -d` on the prod orchestrator host
# after a promote.yml-generated PR is merged. Intentional gate: a human
# reviews the version-pin diff and merges, then this fires.
#
# CRITICAL: this workflow runs against a **persistent ops-managed
# deploy directory** on the host (path provided via repo variable
# `DEPLOY_DIR`), NOT the runner's default `_work` checkout.
# `deploy/compose*.yml` uses relative bind mounts — `./pg_volumes`,
# `./worker_volumes`, `./.secrets/...` — for postgres data, worker
# config, postgres admin password, temporal env files, etc. None of
# those siblings are tracked in git. The persistent dir holds them,
# managed manually by ops; running compose against the runner's
# fresh `_work` checkout would silently start postgres with an empty
# data dir and the secrets-required services would fail outright.
#
# Prereqs on the host (one-time):
#   1. A self-hosted runner registered with the `fishsense-prod`
#      label, running as a user that can write to DEPLOY_DIR and
#      use the docker socket.
#   2. Repo variable `DEPLOY_DIR` set to the absolute path of the
#      deploy checkout (Settings -> Secrets and variables -> Actions
#      -> Variables tab). e.g. `/srv/fishsense`.
#   3. `$DEPLOY_DIR` is a git checkout of this repo with auth
#      configured (SSH key or git credentials helper) for the
#      runner user to `git pull origin main` non-interactively.
#   4. `$DEPLOY_DIR/deploy/{pg_volumes,worker_volumes,
#      temporal_volumes,mafl_volumes,.secrets}` already populated
#      and owned by ops. They survive `git pull` because they're
#      untracked.
#
# Until the runner exists, jobs sit in queue (visible in Actions UI).

on:
  pull_request:
    types: [closed]
    branches: [main]
  # Manual re-pull (re-pull + recreate without bumping a pin). Useful
  # when a service crash-loops and you just want a clean restart.
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    # Only fire on actual merges of auto-deploy/* branches; manual edits
    # to compose files merging via a non-auto-deploy PR shouldn't trigger
    # an automatic prod recreate.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && startsWith(github.head_ref, 'auto-deploy/'))
    runs-on: [self-hosted, fishsense-prod]
    steps:
      - name: Validate DEPLOY_DIR is configured + bootstrapped
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
        run: |
          if [ -z "$DEPLOY_DIR" ]; then
            echo "::error::repo variable DEPLOY_DIR is not set."
            echo "Set it under Settings -> Secrets and variables -> Actions -> Variables"
            echo "to the absolute path of the persistent deploy checkout on this host"
            echo "(e.g. /srv/fishsense). See .github/workflows/deploy.yml header."
            exit 1
          fi
          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            echo "::error::$DEPLOY_DIR is not a git checkout. Bootstrap the host first:"
            echo "  git clone https://github.com/${{ github.repository }} $DEPLOY_DIR"
            exit 1
          fi
          if [ ! -f "$DEPLOY_DIR/deploy/compose.yml" ]; then
            echo "::error::$DEPLOY_DIR/deploy/compose.yml not found. DEPLOY_DIR may be wrong."
            exit 1
          fi

      - name: Sync deploy checkout to latest main
        working-directory: ${{ vars.DEPLOY_DIR }}
        run: |
          git fetch --quiet origin main
          git checkout --quiet main
          git pull --ff-only origin main

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull updated images
        working-directory: ${{ vars.DEPLOY_DIR }}/deploy
        run: docker compose pull

      - name: Recreate services with changed images
        working-directory: ${{ vars.DEPLOY_DIR }}/deploy
        run: docker compose up -d --remove-orphans
