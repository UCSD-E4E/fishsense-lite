name: Deploy

# Rolls out a new image after a promote.yml-generated PR is merged.
# Intentional gate: a human reviews the version-pin diff and merges,
# then this fires. Two routes, picked by branch name:
#
#   - auto-deploy/fishsense-data-processing-workflow-worker-*  ->
#     `deploy-data-worker`: a GitHub-hosted runner runs
#     `kubectl apply -k deploy/k8s/data-worker` against NRP using the
#     `NRP_KUBECONFIG` repo secret. The data-worker is a stateless
#     Kubernetes Deployment — the kustomization is self-contained, so
#     there's nothing to bootstrap on the target host.
#     See deploy/k8s/data-worker/README.md.
#
#   - any other auto-deploy/*  -> `deploy-incus`: the fishsense Incus
#     slot's own self-hosted runner starts `fishsense-selfupdate`, which
#     runs
#       nixos-rebuild switch --flake github:UCSD-E4E/fishsense-lite#fishsense --refresh
#     converging the slot onto the committed root flake.nix +
#     deploy/incus/ interior — including the `image:` pins in
#     deploy/incus/compose.yml that the merged PR just bumped.
#     See deploy/incus/README.md.
#
# WHY THE PIN-BUMP PR MERGE IS THE TRIGGER, and not the release-please
# merge: `fishsense-selfupdate` converges the slot to whatever is on
# main. At the moment the release-please PR merges, main's
# deploy/incus/compose.yml still pins the *previous* versions and the
# `:v<new>` images don't exist yet — promote.yml retags them minutes
# later on `release: published`, and only then opens the pin-bump PR.
# Converging any earlier would redeploy the old images. The full chain:
#
#   release-please PR merged to main
#     -> release.yml cuts the GitHub release
#     -> promote.yml retags :sha-<short> to :v<version> + :latest, then
#        opens auto-deploy/<pkg>-<version> bumping the incus pin
#     -> a human merges that PR
#     -> this workflow converges the slot
#
# The converge is a TRIGGER, not a clean CI gate. `fishsense-selfupdate`
# stops the GitHub runner mid-switch and restarts it after, so the job
# starts the unit with `--no-block` (see the step comment) and reports
# success as soon as the converge is *enqueued* — its green means
# "converge fired", never "containers are healthy". The `verify-incus` job
# below is the deploy gate: it asserts the pins the slot actually deployed
# match the pins on main, and fails the run when they don't.
#
# Do NOT "verify" a deploy with `systemctl status fishsense-selfupdate` —
# its exit code is not a deploy signal. `switch-to-configuration` applies
# the whole config and THEN exits 4 if any unit is `failed`, including one
# it never touched, so a converge routinely deploys correctly and reports
# failure (observed 2026-07-17: containers up at 04:09:51, exit 4 at
# 04:10:32, over an unrelated github-runner registration failure). Ground
# truth is what is running: `docker ps` image tags vs the pins on main.
# See CLAUDE.md, "The converge is a trigger, not a clean CI gate".
#
# Prereqs:
#   - incus: nothing to configure here. The `[self-hosted, fishsense]`
#     runner is auto-provisioned and auto-registered by the platform
#     because the tenant flake sets `repo = "UCSD-E4E/fishsense-lite"`
#     (ADR 0022) — there is no runner token to manage. The label is
#     opt-in: jobs that must stay GitHub-hosted (the NRP data-worker
#     deploy below) use `runs-on: ubuntu-latest` and are NEVER given a
#     bare `runs-on: self-hosted`.
#   - data-worker: repo secret `NRP_KUBECONFIG` = a token kubeconfig
#     for the NRP namespace (the same one the api-worker uses to scale
#     the Deployment). NRP tokens expire — rotate it. The namespace,
#     Secrets, etc. are bootstrapped per deploy/k8s/data-worker/README.md.
#
# Until the slot is bootstrapped / `NRP_KUBECONFIG` exists, the matching
# job fails (or sits in queue) — visible in the Actions UI.

on:
  pull_request:
    types: [closed]
    branches: [main]
  # Manual re-deploy without bumping a pin — handy after a crash-loop, a
  # kubeconfig rotation, or to converge a config-only change under
  # deploy/incus/ that promote.yml never touches.
  workflow_dispatch:
    inputs:
      target:
        description: "Which target to redeploy"
        required: true
        type: choice
        default: incus
        options:
          - incus
          - data-worker

# Least privilege, granted per job (CodeQL actions/missing-workflow-permissions).
# The incus job never touches the GitHub API nor checks out code, so it
# gets no token scopes at all.
permissions: {}

jobs:
  deploy-incus:
    # Fires on:
    #   - merge of an auto-deploy/* PR that is NOT the data-worker
    #   - manual workflow_dispatch with target=incus
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.target == 'incus') ||
      (github.event.pull_request.merged == true &&
       startsWith(github.head_ref, 'auto-deploy/') &&
       !startsWith(github.head_ref, 'auto-deploy/fishsense-data-processing-workflow-worker-'))
    runs-on: [self-hosted, fishsense] # the label the platform sets on our runner
    permissions: {}
    # Two packages released together (e.g. api + web) produce two pin-bump
    # PRs and therefore two converges. Queue them rather than cancelling:
    # a cancelled converge would leave the slot on the older main, and the
    # surviving run would have started `nixos-rebuild` before the second
    # pin landed.
    concurrency:
      group: deploy-incus
      cancel-in-progress: false
    steps:
      - name: Converge the instance
        # --no-block: enqueue the converge and return 0 immediately, rather
        # than blocking on the oneshot. `fishsense-selfupdate`'s first action
        # is `systemctl stop github-runner-fishsense` — it restarts the very
        # runner executing this job. A blocking `systemctl start` is therefore
        # SIGINT'd (exit 130, false red) whenever `nixos-rebuild` outlives the
        # runner's graceful-stop window; a fast converge finishes inside the
        # window and passes, so the same command reports non-deterministic
        # red/green (observed: PR #238 red at ~6min, #240 green at 34s, same
        # code). This job can only honestly assert "converge fired" anyway —
        # its exit 0 never meant the containers came up healthy (see header).
        # Convergence health belongs in a separate post-converge probe.
        run: systemctl start --no-block fishsense-selfupdate # polkit-authorized on the slot

  verify-incus:
    # The deploy gate. deploy-incus is `--no-block`, so its green only ever
    # meant "converge fired" — this asserts the converge actually landed the
    # versions main asked for, and fails the run if not.
    #
    # Why not assert the converge's own exit code: it is not a deploy signal.
    # `switch-to-configuration` applies the whole config and THEN exits 4 if
    # any unit is `failed` — even one it never touched. On 2026-07-17 a
    # converge deployed correctly (containers up at 04:09:51) and reported
    # exit 4 forty-one seconds later because the github-runner unit couldn't
    # register. Gating on that would false-red every working deploy for as
    # long as any unit lingers failed. See CLAUDE.md, "The converge is a
    # trigger, not a clean CI gate", and krg-infra#496.
    #
    # Why not poll the public endpoints (what this job used to do): they stay
    # up on the OLD containers when a converge fails, so the probe went green
    # on a deploy that never happened — the false green this replaces.
    #
    # Why not `docker ps`: /var/run/docker.sock is 0660 root:docker and
    # gh-runner is not in that group. Adding it would be root-equivalent, and
    # the runner is platform-provisioned (ADR 0022) anyway. Instead we read
    # the compose spec the stack unit actually deployed — its ExecStart names
    # the nix-store path, /nix/store is world-readable, and the unit only
    # reaches Result=success if `up -d --force-recreate` brought that spec up.
    #
    # Runs on the slot's own runner on purpose. The converge stops the runner
    # (gracefully, after deploy-incus's job ends) and starts it again on the
    # way out, so this job cannot be dispatched until the converge is done —
    # and if the converge dies leaving the runner down, this job never starts
    # and times out, which is exactly the state a deploy should go red in.
    needs: deploy-incus
    if: needs.deploy-incus.result == 'success'
    runs-on: [self-hosted, fishsense]
    permissions: {}
    timeout-minutes: 25
    concurrency:
      group: verify-incus
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Assert every pin main asked for is the pin that deployed
        run: |
          set -euo pipefail
          SYSTEMCTL=/run/current-system/sw/bin/systemctl

          # The converge may still be running when the runner returns.
          for i in $(seq 1 40); do
            state=$("$SYSTEMCTL" is-active fishsense-selfupdate 2>/dev/null || true)
            [ "$state" != "activating" ] && break
            echo "[$i/40] converge still running..."
            sleep 15
          done

          # Which compose spec did the stack unit actually deploy? ExecStart
          # names it; the store path changes with every flake revision.
          deployed_compose=$("$SYSTEMCTL" show fishsense.service -p ExecStart --value \
            | grep -oE '/nix/store/[a-z0-9]{32}-source/deploy/incus/compose.yml' \
            | head -1)
          if [ -z "$deployed_compose" ] || [ ! -r "$deployed_compose" ]; then
            echo "::error title=Deploy verify::could not read the deployed compose spec from fishsense.service ExecStart"
            "$SYSTEMCTL" show fishsense.service -p ExecStart --value || true
            exit 1
          fi
          echo "deployed compose spec: $deployed_compose"

          pins() { grep -oE 'ghcr\.io/ucsd-e4e/[a-z-]+:v[0-9]+\.[0-9]+\.[0-9]+' "$1" | sort -u; }
          pins "$deployed_compose" > /tmp/deployed-pins.txt
          pins deploy/incus/compose.yml   > /tmp/expected-pins.txt

          if [ ! -s /tmp/expected-pins.txt ]; then
            echo "::error title=Deploy verify::no ghcr pins found in deploy/incus/compose.yml — parser is wrong, refusing to pass vacuously"
            exit 1
          fi

          echo "--- expected (main) ---"; cat /tmp/expected-pins.txt
          echo "--- deployed (slot) ---"; cat /tmp/deployed-pins.txt

          # Every pin must match. A stale slot differs here even though the
          # containers are happily serving the old version.
          #
          # Compared as strings, and reported with `comm`, because the slot's
          # runner has NO diffutils: its PATH is bash/coreutils/findutils/git/
          # gnugrep/gnused/gnutar/gzip/nix/openssh/systemd, so `diff` AND `cmp`
          # are both absent. `if ! diff ...` there is a trap — the missing
          # binary exits non-zero, which reads as "pins differ" and reds every
          # deploy no matter what is on the slot (it did exactly that on this
          # job's first live run). `comm` and `sort` are coreutils, so they are
          # present. Anything added here must be checked against that PATH, not
          # against a dev box.
          if [ "$(cat /tmp/expected-pins.txt)" != "$(cat /tmp/deployed-pins.txt)" ]; then
            echo "::error title=Deploy verify::the slot is NOT running the versions on main (see the expected/deployed lists above). The converge did not land; check 'journalctl -u fishsense-selfupdate' on the slot."
            {
              echo "### ❌ deploy did not land"
              echo "The compose spec the slot deployed does not match main's pins."
              echo ""
              echo "**On main but not deployed:**"
              echo '```'
              comm -23 /tmp/expected-pins.txt /tmp/deployed-pins.txt
              echo '```'
              echo "**Deployed but not on main:**"
              echo '```'
              comm -13 /tmp/expected-pins.txt /tmp/deployed-pins.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "--- on main but not deployed ---"
            comm -23 /tmp/expected-pins.txt /tmp/deployed-pins.txt
            echo "--- deployed but not on main ---"
            comm -13 /tmp/expected-pins.txt /tmp/deployed-pins.txt
            exit 1
          fi

          # Pins match — but the spec is only live if the stack unit brought
          # it up. `up -d --force-recreate` failing (bad pull, crash-loop)
          # leaves the unit failed with the right spec on disk.
          stack_result=$("$SYSTEMCTL" show fishsense.service -p Result --value)
          stack_state=$("$SYSTEMCTL" show fishsense.service -p ActiveState --value)
          echo "fishsense.service: ActiveState=$stack_state Result=$stack_result"
          if [ "$stack_result" != "success" ]; then
            echo "::error title=Deploy verify::pins match but the compose stack unit is $stack_state/$stack_result — containers did not come up"
            exit 1
          fi

          {
            echo "### ✅ deploy verified"
            echo "All $(wc -l < /tmp/expected-pins.txt) pinned images on the slot match main, and the compose stack is \`$stack_state/$stack_result\`."
            echo ""
            echo '```'
            cat /tmp/deployed-pins.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-data-worker:
    # Fires on:
    #   - merge of an auto-deploy/fishsense-data-processing-workflow-worker-* PR
    #   - manual workflow_dispatch with target=data-worker
    #
    # The data-worker is a stateless Kubernetes Deployment on NRP, so
    # this just runs `kubectl apply -k` against the repo checkout — no
    # persistent ops-managed dir, no docker. The Deployment omits
    # `replicas` (the api-worker owns it), so applying is a no-op
    # rollout when it's scaled to 0 and a single-pod replacement when
    # scaled to N. See deploy/k8s/data-worker/README.md.
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.target == 'data-worker') ||
      (github.event.pull_request.merged == true &&
       startsWith(github.head_ref, 'auto-deploy/fishsense-data-processing-workflow-worker-'))
    runs-on: ubuntu-latest
    permissions:
      contents: read # actions/checkout
    env:
      # NRP issues a token kubeconfig per namespace; this is the same
      # one the api-worker uses to scale the Deployment. Empty when the
      # repo secret isn't set yet (validated below).
      NRP_KUBECONFIG: ${{ secrets.NRP_KUBECONFIG }}
    steps:
      - name: Validate NRP_KUBECONFIG is configured
        run: |
          if [ -z "$NRP_KUBECONFIG" ]; then
            echo "::error::repo secret NRP_KUBECONFIG is not set."
            echo "Set it under Settings -> Secrets and variables -> Actions -> Secrets"
            echo "to a token kubeconfig for the NRP namespace. See"
            echo "deploy/k8s/data-worker/README.md for the bootstrap steps."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Write kubeconfig
        run: |
          mkdir -p "$RUNNER_TEMP/.kube"
          umask 077
          printf '%s' "$NRP_KUBECONFIG" > "$RUNNER_TEMP/.kube/config"
          echo "KUBECONFIG=$RUNNER_TEMP/.kube/config" >> "$GITHUB_ENV"

      - name: Apply data-worker manifests (kubectl is preinstalled on ubuntu-latest)
        run: |
          kubectl version --client
          kubectl apply -k deploy/k8s/data-worker
          kubectl rollout status deployment/fishsense-data-processing-workflow-worker --timeout=5m

      - name: Clean up kubeconfig
        if: always()
        run: rm -f "$RUNNER_TEMP/.kube/config"
