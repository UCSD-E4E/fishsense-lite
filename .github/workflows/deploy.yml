name: Deploy

# Rolls out a new image after a promote.yml-generated PR is merged.
# Intentional gate: a human reviews the version-pin diff and merges,
# then this fires. Two routes, picked by branch name:
#
#   - auto-deploy/fishsense-data-processing-workflow-worker-*  ->
#     `deploy-data-worker`: a GitHub-hosted runner runs
#     `kubectl apply -k deploy/k8s/data-worker` against NRP using the
#     `NRP_KUBECONFIG` repo secret. The data-worker is a stateless
#     Kubernetes Deployment — the kustomization is self-contained, so
#     no persistent ops-managed dir is needed (unlike the orchestrator
#     route below). See deploy/k8s/data-worker/README.md.
#
#   - any other auto-deploy/*  -> `deploy-orchestrator`: the
#     `fishsense-prod` self-hosted runner runs `docker compose pull &&
#     up -d` against `compose.yml` (which include:s the four
#     orchestrator-stack siblings).
#
# CRITICAL (orchestrator route only): the `deploy-orchestrator` job
# runs against a **persistent ops-managed deploy directory** on the
# host (path in repo variable `DEPLOY_DIR`), NOT the runner's default
# `_work` checkout. `deploy/compose*.yml` uses relative bind mounts —
# `./pg_volumes`, `./worker_volumes`, `./.secrets/...`,
# `./temporal_volumes/certs` — for postgres data, worker config,
# secrets, certs, none tracked in git. The persistent dir holds them,
# managed manually by ops; compose against a fresh `_work` checkout
# would silently start postgres with an empty data dir.
#
# Prereqs:
#   - orchestrator: a self-hosted runner labelled `fishsense-prod`;
#     repo variable `DEPLOY_DIR` = the absolute path of a persistent
#     git checkout of this repo on that host (auth configured for a
#     non-interactive `git pull origin main`); the untracked sibling
#     dirs under `deploy/` populated by ops (see deploy/README.md).
#   - data-worker: repo secret `NRP_KUBECONFIG` = a token kubeconfig
#     for the NRP namespace (the same one the api-worker uses to scale
#     the Deployment). NRP tokens expire — rotate it. The namespace,
#     Secrets, etc. are bootstrapped per deploy/k8s/data-worker/README.md.
#
# Until the `fishsense-prod` runner / `NRP_KUBECONFIG` exist, the
# matching job fails (or sits in queue) — visible in the Actions UI.

on:
  pull_request:
    types: [closed]
    branches: [main]
  # Manual re-deploy without bumping a pin — handy after a crash-loop
  # or a kubeconfig rotation.
  workflow_dispatch:
    inputs:
      target:
        description: "Which target to redeploy"
        required: true
        type: choice
        default: orchestrator
        options:
          - orchestrator
          - data-worker

permissions:
  contents: read
  packages: read

jobs:
  deploy-orchestrator:
    # Fires on:
    #   - merge of an auto-deploy/* PR that is NOT the data-worker
    #   - manual workflow_dispatch with target=orchestrator
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.target == 'orchestrator') ||
      (github.event.pull_request.merged == true &&
       startsWith(github.head_ref, 'auto-deploy/') &&
       !startsWith(github.head_ref, 'auto-deploy/fishsense-data-processing-workflow-worker-'))
    runs-on: [self-hosted, fishsense-prod]
    steps:
      - name: Validate DEPLOY_DIR is configured + bootstrapped
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
        run: |
          if [ -z "$DEPLOY_DIR" ]; then
            echo "::error::repo variable DEPLOY_DIR is not set."
            echo "Set it under Settings -> Secrets and variables -> Actions -> Variables"
            echo "to the absolute path of the persistent deploy checkout on this host"
            echo "(e.g. /srv/fishsense). See .github/workflows/deploy.yml header."
            exit 1
          fi
          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            echo "::error::$DEPLOY_DIR is not a git checkout. Bootstrap the host first:"
            echo "  git clone https://github.com/${{ github.repository }} $DEPLOY_DIR"
            exit 1
          fi
          if [ ! -f "$DEPLOY_DIR/deploy/compose.yml" ]; then
            echo "::error::$DEPLOY_DIR/deploy/compose.yml not found. DEPLOY_DIR may be wrong."
            exit 1
          fi

      - name: Sync deploy checkout to latest main
        working-directory: ${{ vars.DEPLOY_DIR }}
        run: |
          git fetch --quiet origin main
          git checkout --quiet main
          git pull --ff-only origin main

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull updated images
        working-directory: ${{ vars.DEPLOY_DIR }}/deploy
        run: docker compose pull

      - name: Recreate services with changed images
        working-directory: ${{ vars.DEPLOY_DIR }}/deploy
        run: docker compose up -d --remove-orphans

  deploy-data-worker:
    # Fires on:
    #   - merge of an auto-deploy/fishsense-data-processing-workflow-worker-* PR
    #   - manual workflow_dispatch with target=data-worker
    #
    # The data-worker is a stateless Kubernetes Deployment on NRP, so
    # this just runs `kubectl apply -k` against the repo checkout — no
    # persistent ops-managed dir, no docker. The Deployment omits
    # `replicas` (the api-worker owns it), so applying is a no-op
    # rollout when it's scaled to 0 and a single-pod replacement when
    # scaled to N. See deploy/k8s/data-worker/README.md.
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.target == 'data-worker') ||
      (github.event.pull_request.merged == true &&
       startsWith(github.head_ref, 'auto-deploy/fishsense-data-processing-workflow-worker-'))
    runs-on: ubuntu-latest
    env:
      # NRP issues a token kubeconfig per namespace; this is the same
      # one the api-worker uses to scale the Deployment. Empty when the
      # repo secret isn't set yet (validated below).
      NRP_KUBECONFIG: ${{ secrets.NRP_KUBECONFIG }}
    steps:
      - name: Validate NRP_KUBECONFIG is configured
        run: |
          if [ -z "$NRP_KUBECONFIG" ]; then
            echo "::error::repo secret NRP_KUBECONFIG is not set."
            echo "Set it under Settings -> Secrets and variables -> Actions -> Secrets"
            echo "to a token kubeconfig for the NRP namespace. See"
            echo "deploy/k8s/data-worker/README.md for the bootstrap steps."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Write kubeconfig
        run: |
          mkdir -p "$RUNNER_TEMP/.kube"
          umask 077
          printf '%s' "$NRP_KUBECONFIG" > "$RUNNER_TEMP/.kube/config"
          echo "KUBECONFIG=$RUNNER_TEMP/.kube/config" >> "$GITHUB_ENV"

      - name: Apply data-worker manifests (kubectl is preinstalled on ubuntu-latest)
        run: |
          kubectl version --client
          kubectl apply -k deploy/k8s/data-worker
          kubectl rollout status deployment/fishsense-data-processing-workflow-worker --timeout=5m

      - name: Clean up kubeconfig
        if: always()
        run: rm -f "$RUNNER_TEMP/.kube/config"
