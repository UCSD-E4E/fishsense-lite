name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: libs/fishsense-api-sdk
            cov: fishsense_api_sdk
          - package: services/fishsense-api
            cov: fishsense_api
          - package: services/fishsense-data-processing-workflow-worker
            cov: fishsense_data_processing_workflow_worker
    name: pytest (${{ matrix.package }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: pip install uv
      # fishsense-core (Rust+PyO3) is built from a git source via uv. Its
      # build chain needs:
      #  - llvm-dev + libclang-dev: clang-sys bindgens C headers
      #  - libopencv-dev:           the `opencv` Rust crate links the C++ lib
      # ubuntu-latest has none of them by default.
      - name: Install build deps for fishsense-core
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends llvm-dev libclang-dev libopencv-dev
      - name: Sync workspace (all packages, all groups)
        run: uv sync --all-packages --all-groups
      - name: Run pytest with coverage
        run: |
          uv run --directory ${{ matrix.package }} pytest -v \
            --cov=${{ matrix.cov }} \
            --cov-report=term-missing \
            --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ matrix.package }}/coverage.xml
          flags: ${{ matrix.cov }}
          name: ${{ matrix.cov }}
          fail_ci_if_error: false
