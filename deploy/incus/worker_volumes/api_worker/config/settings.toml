# fishsense-api-workflow-worker — Incus interior settings.
#
# Non-secret config only. Secrets are rendered to WRITABLE runtime paths by the
# in-instance vault-agent from secret/tenants/fishsense/* (e.g. the temporal
# client cert trio under /run/tenant/temporal/) — NOT into this dir, which is a
# read-only store bind. The NRP kubeconfig is not delivered yet; see [kubernetes].
#
# DIFF vs the old orchestrator settings.toml: [temporal] now points at the
# shared krg-prod cluster instead of the in-stack `fishsense-temporal`.

[general]
max_workers = 8

# krg-prod shared Temporal (HANDOFF §6). mTLS-only; the gRPC TLS server-name is
# overridden to workflows.krg.ucsd.edu even though we dial krg-prod.ucsd.edu.
# The client cert/key/CA are rendered by the in-instance vault-agent to
# /run/tenant/temporal/ (wired by krg-infra #435; the trio is present on the
# slot). The CN switches to `fishsense-worker` once #435's grant is live.
[temporal]
host = "krg-prod.ucsd.edu"
port = "7233"
tls = true
# Tenant namespace on the shared krg-prod cluster (krg-infra terraform/temporal).
# OSS mTLS authenticates the client but does NOT pin it to a namespace (ADR 0023),
# so it must be requested explicitly — omitting it lands workflows in `default`.
namespace = "fishsense"
client_cert = "/run/tenant/temporal/tls.crt"
client_private_key = "/run/tenant/temporal/tls.key"
domain = "workflows.krg.ucsd.edu"           # TLS server-name override (SNI)
server_root_ca_cert = "/run/tenant/temporal/ca.crt"

[label_studio]
# Hosted Label Studio (HumanSignal) — the self-hosted labeler.e4e.ucsd.edu was retired.
url = "https://app.heartex.com"
# LS Enterprise workspace new per-dive projects are created in. Resolved to
# its numeric id at runtime via workspaces.list(). Empty = personal/default.
workspace = "FishSense"

[e4e_nas]
url = "https://e4e-nas.ucsd.edu:6021"
# One serial .ORF download at a time — FileStation's download backend falls
# over under concurrent large transfers. Ramp up (2, 3) only while watching
# the NAS stay healthy.
stage_concurrency = 1

# Interior-network URL for SDK calls into fishsense-api — same compose network,
# bypasses our traefik + the API forwardAuth gate.
[fishsense_api]
url = "http://fishsense-api:8000"

# Hosted Garage (S3-compatible) object store on the NAS. S3 keys authenticate
# from any IP (open egress NAT reaches it). access_key/secret_key in .secrets.toml.
[object_store]
endpoint_url = "https://s3.e4e.ucsd.edu"
region = "garage"
# `bucket` = raw/slate scratch; `labels_bucket` = the LS-facing bucket where
# processed JPEGs live (under `labels_prefix`). krg-infra provisioned both.
bucket = "fishsense-lite"
labels_bucket = "labels-fishsense-lite"
labels_prefix = "fishsense-lite"

# NRP data-worker scale-to-zero. The api-worker scales the data-worker
# Deployment (ns `e4e-fishsense`) 0 <-> active_replicas on demand.
#
# `kubeconfig_path` points at a vault-agent SOFT render (secrets.nix →
# /run/tenant/nrp/kubeconfig, mounted into this worker by compose.yml) — the
# committed config dir is a read-only store bind, so the secret kubeconfig
# can't live here. config.py validates the path with a `path_validator` that
# runs eagerly at startup, so the file MUST exist: seed `nrp.kubeconfig` in
# OpenBao BEFORE this converges, or the worker crash-loops (isolated to this
# worker; the slot stays up because the render is soft). With `kubeconfig_path`
# absent the scaling activity no-ops (data-worker assumed always-on).
#
# `namespace` MUST match the NRP namespace + the kustomization pin in
# deploy/k8s/data-worker (e4e-fishsense) — it's where the scale patch is applied.
[kubernetes]
kubeconfig_path = "/run/tenant/nrp/kubeconfig"
namespace = "e4e-fishsense"
deployment_name = "fishsense-data-processing-workflow-worker"
active_replicas = 1
idle_cooldown_minutes = 15
