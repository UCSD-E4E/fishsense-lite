# fishsense-data-processing-workflow-worker — separate-host compose.
#
# Runs on its own host, NOT the orchestrator. This file is intentionally
# **not** included by compose.yml; `docker compose up` on the
# orchestrator host will not start a data-worker. Invoke it explicitly
# from the data-worker host's deploy directory:
#
#   docker compose -f compose.data-worker.yml pull
#   docker compose -f compose.data-worker.yml up -d
#
# Auto-deploy: deploy.yml routes
# `auto-deploy/fishsense-data-processing-workflow-worker-*` PR merges to
# a self-hosted runner labelled `fishsense-data-worker`, against the
# persistent path stored in repo variable `DATA_WORKER_DEPLOY_DIR`.
# See deploy/README.md "Data-worker host bootstrap" for one-time setup.

services:
  fishsense-data-processing-workflow-worker:
    image: ghcr.io/ucsd-e4e/fishsense-data-processing-workflow-worker:v0.4.0
    volumes:
      - ./temporal_volumes/certs:/certs:ro
      - ./worker_volumes/data_worker/config:/e4efs/config:ro
      - ./worker_volumes/data_worker/logs:/e4efs/logs:rw
    restart: on-failure:15
