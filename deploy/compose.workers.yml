# fishsense-* worker services that run on the orchestrator host.
#
# Workers consume Temporal but aren't part of the Temporal cluster, so
# they don't belong in compose.temporal.yml. Group them here and the
# deploy.yml workflow will find any GHCR pin matching
# `image: ghcr.io/ucsd-e4e/<package>:v*` and bump it via PR on release.
#
# fishsense-data-processing-workflow-worker is intentionally NOT here:
# it runs on NRP/Kubernetes (deploy/k8s/data-worker/), not as a compose
# service. promote.yml bumps the image tag in that kustomization and
# deploy.yml `kubectl apply`s it; the api-worker scales the Deployment
# 0 <-> active_replicas at runtime.

services:
  fishsense-api-workflow-worker:
    image: ghcr.io/ucsd-e4e/fishsense-api-workflow-worker:v1.35.3
    depends_on:
      - temporal
    volumes:
      - ./temporal_volumes/certs:/certs:ro
      - ./worker_volumes/api_worker/config:/e4efs/config:ro
      - ./worker_volumes/api_worker/logs:/e4efs/logs:rw
    # `default` for fishsense-temporal (compose.temporal.yml); `traefik_proxy`
    # for fishsense-api + static_file_server (compose.orchestrator.yml). The
    # SDK calls into fishsense-api on the internal hostname bypass the public
    # Traefik route + authentik middleware — see settings.toml [fishsense_api].
    networks:
      - default
      - traefik_proxy
    restart: on-failure:15
    deploy:
      replicas: 2

  fishsense-backup-worker:
    image: ghcr.io/ucsd-e4e/fishsense-backup-worker:v0.3.1
    depends_on:
      - temporal
    volumes:
      - ./temporal_volumes/certs:/certs:ro
      - ./worker_volumes/backup_worker/config:/e4efs/config:ro
      - ./worker_volumes/backup_worker/logs:/e4efs/logs:rw
    restart: on-failure:15
