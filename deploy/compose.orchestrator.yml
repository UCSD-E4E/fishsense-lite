services:
  # The nginx `static_file_server` (worker file-exchange + labeler-facing
  # `/api/v1/data` routes) was removed when storage moved to the hosted
  # Garage (S3-compatible) object store. The api-worker stages raw/slate
  # scratch into Garage and the data-worker reads/writes it via S3;
  # Label Studio reads processed JPEGs straight from Garage via
  # per-project presigned URLs. There's nothing for Traefik to route
  # here anymore — Garage is hosted separately (see the workers'
  # `[object_store]` settings).

  fishsense-api:
    image: ghcr.io/ucsd-e4e/fishsense-api:v1.28.0
    volumes:
      - ./fishsense_api_volumes/config:/e4efs/config:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fishsense_api_server.rule=Host(`orchestrator.fishsense.e4e.ucsd.edu`)"
      - "traefik.http.routers.fishsense_api_server.entrypoints=websecure"
      - "traefik.http.routers.fishsense_api_server.tls.certresolver=letsencrypt"
      - "traefik.http.routers.fishsense_api_server.middlewares=authentik@docker"
      - "traefik.http.services.fishsense_api_server.loadbalancer.server.port=8000"
    networks:
      - traefik_proxy
    deploy:
      replicas: 4
    restart: on-failure:15