services:
  static_file_server:
    image: nginx:1.29-alpine
    depends_on:
      - fishsense-api
    labels:
      - "traefik.enable=true"
      # Labeler-facing read-only routes. CORS is set in nginx.conf; no
      # auth middleware here because labelers' browsers fetch images
      # directly using their existing labeler.e4e.ucsd.edu session.
      - "traefik.http.routers.fishsense_static_file_server.rule=Host(`orchestrator.fishsense.e4e.ucsd.edu`) && PathPrefix(`/api/v1/data`)"
      - "traefik.http.routers.fishsense_static_file_server.entrypoints=websecure"
      - "traefik.http.routers.fishsense_static_file_server.tls.certresolver=letsencrypt"
      # Worker-to-worker file-exchange — separate router so the
      # `/api/v1/data` path stays CORS-only and the exchange path can
      # have its own auth middleware. Lets the data-worker (off the
      # orchestrator's docker network — it runs on NRP) GET/PUT/DELETE
      # on `/api/v1/exchange/*`. (The api-worker, on this host, hits
      # the internal `static_file_server` hostname and skips Traefik.)
      #
      # Auth (current): IP allowlist — but the data-worker now runs on
      # NRP, where pods have no stable egress IP, so this is broken for
      # it as soon as it deploys. **Required migration**: swap the
      # `fishsense_exchange_ip_allowlist` middleware for `authentik@docker`
      # (mirror the `fishsense_api_server` router below) + an authentik
      # application / basic-auth-passthrough policy / service-account,
      # and set the data-worker's `file_exchange.username/password`. See
      # deploy/k8s/data-worker/README.md and project memory
      # `project_data_worker_authentik_todo.md`. Until then the
      # data-worker's exchange calls 302 → preprocess child workflows
      # fail.
      - "traefik.http.routers.fishsense_static_file_server_exchange.rule=Host(`orchestrator.fishsense.e4e.ucsd.edu`) && PathPrefix(`/api/v1/exchange`)"
      - "traefik.http.routers.fishsense_static_file_server_exchange.entrypoints=websecure"
      - "traefik.http.routers.fishsense_static_file_server_exchange.tls.certresolver=letsencrypt"
      - "traefik.http.routers.fishsense_static_file_server_exchange.middlewares=fishsense_exchange_ip_allowlist"
      - "traefik.http.middlewares.fishsense_exchange_ip_allowlist.ipallowlist.sourcerange=132.239.95.67/32"
    volumes:
      - ./static_file_server/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./static_file_server_volumes/data:/data
    networks:
      - traefik_proxy
    deploy:
      replicas: 2
    restart: on-failure:15

  fishsense-api:
    image: ghcr.io/ucsd-e4e/fishsense-api:v1.28.0
    volumes:
      - ./fishsense_api_volumes/config:/e4efs/config:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fishsense_api_server.rule=Host(`orchestrator.fishsense.e4e.ucsd.edu`)"
      - "traefik.http.routers.fishsense_api_server.entrypoints=websecure"
      - "traefik.http.routers.fishsense_api_server.tls.certresolver=letsencrypt"
      - "traefik.http.routers.fishsense_api_server.middlewares=authentik@docker"
      - "traefik.http.services.fishsense_api_server.loadbalancer.server.port=8000"
    networks:
      - traefik_proxy
    deploy:
      replicas: 4
    restart: on-failure:15