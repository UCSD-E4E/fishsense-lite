# Local-development override.
#
# Usage from this directory:
#   docker compose -f compose.yml -f compose.dev.yml up --build <service>
#
# Replaces the pinned ghcr.io image refs in compose.orchestrator.yml /
# compose.temporal.yml with a local `build:` so an edit in services/<svc>/
# is picked up on the next `--build`. Services without a Dockerfile in this
# monorepo (e.g. fishsense-data-processing-workflow-worker) are not overridden.
#
# image: is omitted to let docker compose generate a deterministic local tag
# from the compose project + service name (so it doesn't collide with the
# pinned production tag).

services:
  fishsense-api:
    image: !reset null
    build:
      context: ../services/fishsense-api

  fishsense-api-workflow-worker:
    image: !reset null
    build:
      context: ../services/fishsense-api-workflow-worker
