[general]
max_workers=8

[temporal]
host = "fishsense-temporal"
port = "7233"
tls = true
client_cert = "/certs/client/fishsense-api-workflow-worker.pem"
client_private_key = "/certs/client/fishsense-api-workflow-worker.key"
domain = "workflows.fishsense.e4e.ucsd.edu"
server_root_ca_cert = "/certs/ca/root-ca.pem"

[label_studio]
url = "https://labeler.e4e.ucsd.edu"
# URL prefix embedded into Label Studio task `data.image` fields —
# labelers' browsers fetch from here through Traefik. /api/v1/data is
# publicly routed (CORS-enabled, no auth at the Traefik layer);
# /api/v1/exchange is also publicly routed now (second router for the
# data-worker on a separate host) but worker-only and is the surface
# that needs the auth middleware once one is attached.
image_url_base = "https://orchestrator.fishsense.e4e.ucsd.edu"

[e4e_nas]
url = "https://e4e-nas.ucsd.edu:6021"

[fishsense_api]
url = "https://orchestrator.fishsense.e4e.ucsd.edu"

# Internal docker URL the api-worker uses to GET slate PDFs / PUT
# processed JPEGs / DELETE raw .ORF entries on the file-exchange
# (/api/v1/exchange/*). The api-worker runs on the orchestrator host
# alongside static_file_server on the same docker network, so this
# bypasses Traefik (and any auth middleware on the public exchange
# router) entirely. The data-worker, on a separate host, uses the
# public Traefik route instead.
[file_exchange]
url = "http://static_file_server"