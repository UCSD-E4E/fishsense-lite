[general]
max_workers=8

[temporal]
host = "fishsense-temporal"
port = "7233"
tls = true
client_cert = "/certs/client/fishsense-api-workflow-worker.pem"
client_private_key = "/certs/client/fishsense-api-workflow-worker.key"
domain = "workflows.fishsense.e4e.ucsd.edu"
server_root_ca_cert = "/certs/ca/root-ca.pem"

[label_studio]
url = "https://labeler.e4e.ucsd.edu"

[e4e_nas]
url = "https://e4e-nas.ucsd.edu:6021"

# Internal docker URL the api-worker uses for SDK calls into
# fishsense-api. The api-worker runs on the orchestrator host alongside
# fishsense-api on the same docker network (traefik_proxy, declared
# explicitly on both services in compose), so this bypasses Traefik
# and the authentik middleware in front of the public hostname. The
# port matches `traefik.http.services.fishsense_api_server.loadbalancer.server.port`
# in compose.orchestrator.yml.
[fishsense_api]
url = "http://fishsense-api:8000"

# Garage (S3-compatible) object store — replaces the nginx file-exchange
# AND the fishsense_process_work NAS share. The api-worker stages raw
# `.ORF` + slate PDFs into the `raw/` / `slate_pdf/` scratch prefixes and
# cleans the `raw/` scratch up after the data-worker produces the JPEGs;
# the JPEGs themselves live here durably and Label Studio reads them via
# per-project presigned URLs. `access_key` / `secret_key` go in
# `.secrets.toml`. `presign_*` (optional, also in `.secrets.toml`) is a
# read-only key handed to Label Studio for presigning; omit it to reuse
# the main key.
[object_store]
endpoint_url = "https://garage.fishsense.e4e.ucsd.edu"
region = "garage"
bucket = "fishsense"
