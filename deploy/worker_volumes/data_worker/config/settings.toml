# fishsense-data-processing-workflow-worker — production settings.
#
# Loaded by Dynaconf (E4EFS_ prefix) at worker startup. The companion
# `.secrets.toml` carries credentials — on NRP that's a Kubernetes
# Secret mounted next to this file (which itself ships as a ConfigMap);
# see deploy/k8s/data-worker/. See validators in
# services/fishsense-data-processing-workflow-worker/src/.../config.py
# for the required key set.
#
# Networking: the data-worker runs off the orchestrator's docker
# network (on NRP, in pods with no stable egress IP), so every URL
# below must be publicly routable. That's a change from the api-worker
# pattern, where some endpoints use internal docker hostnames.
#
# `file_exchange.url` reaches static_file_server through Traefik's
# `fishsense_static_file_server_exchange` router (deploy/
# compose.orchestrator.yml), which is fronted by authentik
# basic-auth-passthrough — the worker presents the
# `file_exchange.username`/`password` from `.secrets.toml` so the
# request survives the proxy. (This replaced an IP allowlist that
# couldn't work once the worker moved to NRP.)

[general]
max_workers = 8

[temporal]
host = "workflows.fishsense.e4e.ucsd.edu"
port = "7233"
tls = true
# Data-worker's own mTLS client identity (distinct from the api-worker's).
# On NRP these are mounted from a Kubernetes Secret at /certs.
client_cert = "/certs/client/fishsense-data-processing-workflow-worker.pem"
client_private_key = "/certs/client/fishsense-data-processing-workflow-worker.key"
domain = "workflows.fishsense.e4e.ucsd.edu"
server_root_ca_cert = "/certs/ca/root-ca.pem"

[fishsense_api]
url = "https://orchestrator.fishsense.e4e.ucsd.edu"

# Public hostname — the data-worker is off the orchestrator's docker
# network, so it cannot use the internal `static_file_server` hostname
# like the api-worker does. Routes through Traefik + authentik on the
# orchestrator host; `file_exchange.username`/`password` live in
# `.secrets.toml` (a k8s Secret on NRP).
[file_exchange]
url = "https://orchestrator.fishsense.e4e.ucsd.edu"

# No NAS access from the data-worker by design — the api-worker is the
# only side that touches the NAS, and it stages all bytes the
# data-worker needs onto the file-exchange before dispatching child
# workflows. Don't add an [e4e_nas] block here.
