# fishsense-data-processing-workflow-worker — production settings.
#
# Loaded by Dynaconf (E4EFS_ prefix) at worker startup. The companion
# `.secrets.toml` (gitignored, populated on the host next to this file)
# carries credentials. See validators in
# services/fishsense-data-processing-workflow-worker/src/.../config.py
# for the required key set.
#
# Networking: the data-worker host is genuinely off-network (separate
# machine, not on the orchestrator's docker network), so every URL
# below must be publicly routable. That's a change from the api-worker
# pattern, where some endpoints use internal docker hostnames.
#
# Prereq for `file_exchange.url`: today static_file_server's Traefik
# router rule is `PathPrefix(/api/v1/data)` only — the file-exchange
# surface (/api/v1/exchange/) supports PUT/DELETE and is intentionally
# not publicly exposed. Before the data-worker can run, ops must
# extend that Traefik route (e.g.
# `(PathPrefix(/api/v1/data) || PathPrefix(/api/v1/exchange))`) AND
# protect the exchange path with basic auth or an IP allowlist
# (otherwise PUT/DELETE is open to the internet).

[general]
max_workers = 8

[temporal]
host = "fishsense-temporal"
port = "7233"
tls = true
client_cert = "/certs/client/fishsense-data-processing-workflow-worker.pem"
client_private_key = "/certs/client/fishsense-data-processing-workflow-worker.key"
domain = "workflows.fishsense.e4e.ucsd.edu"
server_root_ca_cert = "/certs/ca/root-ca.pem"

[fishsense_api]
url = "https://orchestrator.fishsense.e4e.ucsd.edu"

# Public hostname — the data-worker is on a separate machine, so it
# cannot use the internal docker hostname `static_file_server` like
# the api-worker does. Routes through Traefik on the orchestrator
# host. See top-of-file note about the prerequisite Traefik rule
# extension + auth that ops must put in place.
[file_exchange]
url = "https://orchestrator.fishsense.e4e.ucsd.edu"

[e4e_nas]
url = "https://e4e-nas.ucsd.edu:6021"
