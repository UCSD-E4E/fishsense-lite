# fishsense-data-processing-workflow-worker — production settings.
#
# Loaded by Dynaconf (E4EFS_ prefix) at worker startup. The companion
# `.secrets.toml` (gitignored, populated on the host next to this file)
# carries credentials. See validators in
# services/fishsense-data-processing-workflow-worker/src/.../config.py
# for the required key set.
#
# Networking: the data-worker host is genuinely off-network (separate
# machine, not on the orchestrator's docker network), so every URL
# below must be publicly routable. That's a change from the api-worker
# pattern, where some endpoints use internal docker hostnames.
#
# Storage is the hosted Garage (S3-compatible) object store — the
# data-worker reads staged raw `.ORF` + slate PDFs from it and writes
# processed JPEGs back. Garage S3 access keys authenticate from any IP,
# so there's no IP allowlist / forward-auth to track here anymore (this
# is what unblocks running the data-worker off-prem, e.g. on NRP, with
# no stable egress IP). `access_key` / `secret_key` live in
# `.secrets.toml`.

[general]
max_workers = 8

[temporal]
host = "workflows.fishsense.e4e.ucsd.edu"
port = "7233"
tls = true
client_cert = "/certs/client/fishsense-api-workflow-worker.pem"
client_private_key = "/certs/client/fishsense-api-workflow-worker.key"
domain = "workflows.fishsense.e4e.ucsd.edu"
server_root_ca_cert = "/certs/ca/root-ca.pem"

[fishsense_api]
url = "https://orchestrator.fishsense.e4e.ucsd.edu"

# Hosted Garage (S3-compatible) object store. The data-worker reads
# staged raw `.ORF` + slate PDFs and writes processed JPEGs back. S3
# access keys authenticate from any IP. `access_key` / `secret_key`
# live in `.secrets.toml`.
[object_store]
endpoint_url = "https://garage.fishsense.e4e.ucsd.edu"
region = "garage"
bucket = "fishsense"

# No NAS access from the data-worker by design — the api-worker is the
# only side that touches the NAS, and it stages all bytes the
# data-worker needs into the Garage object store before dispatching
# child workflows. Don't add an [e4e_nas] block here.
