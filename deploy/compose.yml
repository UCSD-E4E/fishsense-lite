include:
  - compose.orchestrator.yml
  - compose.superset.yml
  - compose.temporal.yml
  - compose.workers.yml



services:
  qcomm-static-file-server:
    image: nginx:1.29-alpine
    depends_on:
      - fishsense-api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fishsense_qualcomm_static_file_server.rule=Host(`qcomm.docs.fabricant.ucsd.edu`)"
      - "traefik.http.routers.fishsense_qualcomm_static_file_server.entrypoints=websecure"
      - "traefik.http.routers.fishsense_qualcomm_static_file_server.tls.certresolver=letsencrypt"
      - "traefik.http.routers.fishsense_qualcomm_static_file_server.middlewares=authentik@docker"
    volumes:
      - ./qcomm_static_file_server/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./qcomm_static_file_server_volumes/www_root:/www_root:ro
    networks:
      - traefik_proxy
    restart: on-failure:15

  fishsense-lite-web:
    image: ghcr.io/ucsd-e4e/fishsense-lite-web:v0.5.0
    restart: on-failure:15
    env_file:
      # Untracked, populated on the host. Required keys:
      #   FISHSENSE_API_URL, FISHSENSE_API_USERNAME, FISHSENSE_API_PASSWORD,
      #   LABEL_STUDIO_URL, LABEL_STUDIO_API_KEY,
      #   AUTH_SECRET, AUTH_AUTHENTIK_ID, AUTH_AUTHENTIK_SECRET, AUTH_AUTHENTIK_ISSUER
      # See apps/fishsense-lite-web/.env.example for the canonical shape.
      - ./web_volumes/.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fishsense_lite_web.rule=Host(`fishsense.e4e.ucsd.edu`)"
      - "traefik.http.routers.fishsense_lite_web.entrypoints=websecure"
      - "traefik.http.routers.fishsense_lite_web.tls.certresolver=letsencrypt"
      - "traefik.http.services.fishsense_lite_web.loadbalancer.server.port=3000"
    networks:
      # `default` so SSR can reach fishsense-api on the internal docker network
      # (bypassing the public Traefik route + authentik middleware).
      - traefik_proxy
      - default

  postgres:
    image: postgres:16.11
    restart: on-failure:15
    shm_size: 128 mb
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_admin_password
    volumes:
      - ./pg_volumes/data/:/var/lib/postgresql/data/:rw
      - ./pg_volumes/config/:/etc/postgresql/:ro
      # - ./.secrets/certs/:/certs/:ro
      - ./pg_volumes/scripts/:/docker-entrypoint-initdb.d/:ro
      - /etc/passwd:/etc/passwd:ro
    secrets:
      - postgres_admin_password
    command: --config_file=/etc/postgresql/postgres.conf
    ports:
      - 5432:5432
    user: "${USER_ID}:${GROUP_ID}"

secrets:
  postgres_admin_password: 
    file: .secrets/postgres_admin_password.txt

networks:
  orchestrator:
  prometheus_network:
    external: true
  traefik_proxy:
    external: true
