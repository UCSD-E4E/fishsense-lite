map $http_upgrade $connection_upgrade_keepalive {
    default upgrade;
    ''      '';
}

server {
    listen 80 http2;
    server_name api;

    location /api/v1/data {
        alias /data;
        add_header 'Access-Control-Allow-Origin' 'https://labeler.e4e.ucsd.edu';
    }

    location = /api/v1/data/ping {
        access_log off;
        add_header 'Content-Type' 'application/json';
        return 200 '{"status":"UP"}';
    }

    # Labeler-facing GETs read JPEGs from the data-worker's PUT
    # destination under `/data/exchange/<folder>/`. The `/api/v1/data`
    # alias maps to `/data`, so rewriting to
    # `/api/v1/data/exchange/<physical_folder>/$1.JPG` resolves on
    # disk to `/data/exchange/<physical_folder>/$1.JPG` — the same
    # path DAV PUTs via `/api/v1/exchange/` write to.

    # Groups
    location /api/v1/data/groups_jpeg {
        rewrite /api/v1/data/groups_jpeg/(.*) /api/v1/data/exchange/preprocess_groups_jpeg/$1.JPG;
    }

    # Laser
    location ~ ^/api/v1/data/preprocess_jpeg/\w+$ {
        rewrite /api/v1/data/preprocess_jpeg/(.*) /api/v1/data/exchange/preprocess_jpeg/$1.JPG;
    }

    # Head/Tail
    location /api/v1/data/headtail_jpeg {
        rewrite /api/v1/data/headtail_jpeg/(.*) /api/v1/data/exchange/preprocess_headtail_jpeg/$1.JPG;
    }

    # Dive Slates
    location /api/v1/data/dive_slate_jpgs {
        rewrite /api/v1/data/dive_slate_jpgs/(.*) /api/v1/data/exchange/preprocess_slate_images_jpeg/$1.JPG;
    }

    # Worker-to-worker file-exchange. The api-worker stages raw inputs and
    # consumes processed outputs; the data-worker GETs raw inputs and PUTs
    # processed outputs. Intentionally NOT under /api/v1/data — those
    # routes carry CORS for the labeler and are read-only-public.
    #
    # DELETE is enabled so the api-worker can clean up raw .ORF entries
    # after Phase 3b archive succeeds. JPEGs intentionally stay until
    # the LS projects referencing them are cleaned up.
    location /api/v1/exchange/ {
        alias /data/exchange/;
        client_max_body_size 200M;
        dav_methods PUT DELETE;
        create_full_put_path on;
        dav_access user:rw group:rw all:r;
    }
}