# Self-contained local stack for the devcontainer.
#
# This file is INTENTIONALLY NOT layered on compose.yml. The prod compose pulls
# in Authentik middleware, mTLS certs, letsencrypt, multi-replica deploys, and
# Superset — none of which are appropriate (or even bootable) on a laptop.
# Keep prod and local cleanly separated.
#
# Usage:
#   1. Copy .env.local.example to .env (in this deploy/ directory).
#   2. Edit FISHSENSE_DUMP_PATH to point at the prod backup on your host.
#   3. From the repo root, open in VSCode and "Reopen in Container".
#      OR from this directory: docker compose -f compose.local.yml up -d
#
# Volumes are NAMED docker volumes (not bind mounts into the repo) so the
# restored prod data — which is large — never lands inside the git tree.

name: fishsense-local

services:
  postgres:
    # Bumped past the prod compose.yml's pin (16.11) because the prod backup
    # uses pg_dump custom format v1.16, which only Postgres 17+ pg_restore can
    # read. Prod itself is presumably already on PG17 (otherwise it couldn't
    # produce that format) — deploy/compose.yml's pin is just stale. Local
    # tracks the dump.
    image: postgres:17
    restart: on-failure:15
    shm_size: 256mb
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fishsense_local}
      POSTGRES_USER: postgres
      # Consumed by 00_restore.sh
      FISHSENSE_DB_NAME: ${FISHSENSE_DB_NAME:-fishsense}
      TEMPORAL_DB_USER: temporal
      TEMPORAL_DB_PWD: ${TEMPORAL_DB_PWD:-temporal_local}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./pg_volumes/scripts.local:/docker-entrypoint-initdb.d:ro
      # Read-only mount of the prod backup on the host. Path resolved from .env.
      - ${FISHSENSE_DUMP_PATH:-/dev/null}:/var/backups/fishsense.dump:ro
    ports:
      - "5432:5432"
    networks:
      - fishsense_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.29
    restart: on-failure:15
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      DBNAME: temporal_db
      VISIBILITY_DBNAME: temporal_visibility_db
      POSTGRES_USER: temporal
      POSTGRES_PWD: ${TEMPORAL_DB_PWD:-temporal_local}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/docker.yaml
      BIND_ON_IP: 0.0.0.0
      # No TEMPORAL_TLS_* on purpose — the upstream config_template.yaml only
      # writes TLS sections when those env vars are set, so omitting them
      # disables TLS cleanly without a custom template.
    ports:
      - "7233:7233"
    volumes:
      - ./temporal_volumes/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    networks:
      - fishsense_local

  temporal-ui:
    image: temporalio/ui:2.44.0
    restart: on-failure:15
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
      # No auth in local — TEMPORAL_AUTH_ENABLED unset means anonymous.
    ports:
      - "8233:8080"
    networks:
      - fishsense_local

  fishsense-api:
    # Build from source rather than pulling a pinned prod image. This
    # is the local stack — used by integration.yml + dev — and we want
    # it to exercise whatever fishsense-api source is currently on the
    # branch, not a previously-published image that may be broken.
    #
    # Concrete failure mode this avoids: integration tests on a PR that
    # depends on a fishsense-api source change would otherwise pull the
    # last-released image, which doesn't have the change. v1.27.0 made
    # this acute — the published image crash-loops on `import alembic`
    # because alembic was misclassified as a dev dep, so every PR's
    # backup-worker pg_dump integration test fails on an empty DB.
    #
    # The Dockerfile is monorepo-aware (build context = repo root,
    # `-f services/fishsense-api/Dockerfile`), so the `context: ..` +
    # `dockerfile: services/fishsense-api/Dockerfile` shape works.
    build:
      context: ..
      dockerfile: services/fishsense-api/Dockerfile
    restart: on-failure:15
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      E4EFS_DOCKER: "true"
      # fishsense-api reads dynaconf from /e4efs/config/{settings.toml,.secrets.toml}.
      # We pass postgres credentials via env (E4EFS_ prefix) so the local
      # settings.toml only carries non-secret host/port/db.
      E4EFS_POSTGRES__USERNAME: postgres
      E4EFS_POSTGRES__PASSWORD: ${POSTGRES_PASSWORD:-fishsense_local}
    volumes:
      - ./fishsense_api_volumes/config.local:/e4efs/config:ro
    ports:
      - "8000:8000"
    networks:
      - fishsense_local

  # Renders the live Garage config from the secret-free template by
  # prepending a randomly-generated rpc_secret (see garage/keygen.sh) onto
  # the shared `garage_config` volume. Runs before the daemon so no secret
  # is ever committed to the repo. One-shot, idempotent.
  garage-keygen:
    image: alpine:3.20
    restart: "no"
    volumes:
      - ./garage/garage.toml.template:/template:ro
      - ./garage/keygen.sh:/keygen.sh:ro
      - garage_config:/config
    entrypoint: ["/bin/sh", "/keygen.sh"]
    networks:
      - fishsense_local

  # Real Garage (the same S3 object store we run in prod) — single-node,
  # no replication. Running the actual implementation rather than an
  # emulator means the integration tests exercise Garage's path-style +
  # presign behavior, not a stand-in's approximation of it. Config +
  # bootstrap live in deploy/garage/. `:3900` = S3 API. The rendered config
  # (with the generated rpc_secret) comes from the garage_config volume via
  # GARAGE_CONFIG_FILE — there's no config bind-mount and no committed secret.
  garage:
    image: dxflrs/garage:v1.0.1
    restart: on-failure:15
    depends_on:
      garage-keygen:
        condition: service_completed_successfully
    environment:
      GARAGE_CONFIG_FILE: /config/garage.toml
    volumes:
      - garage_config:/config:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    ports:
      - "3900:3900"
    healthcheck:
      # The garage image is distroless (no shell), so use the exec form;
      # `garage status` exits 0 once the daemon's RPC is up. (GARAGE_CONFIG_FILE
      # from the service env is inherited by the healthcheck exec.)
      test: ["CMD", "/garage", "status"]
      interval: 3s
      timeout: 5s
      retries: 20
    networks:
      - fishsense_local

  # One-shot idempotent bootstrap: assign the storage layout, create the
  # `fishsense` bucket, import a FIXED access key (deterministic test
  # creds), grant it rw. Built from deploy/garage/Dockerfile.init (alpine
  # + the static garage binary) because the garage image has no shell.
  # Shares the rendered config (for the rpc_secret) + garage's metadata
  # volume (for the node key) so the CLI can connect over RPC. Exits 0 when
  # done; `dev` waits on its completion.
  garage-init:
    build:
      context: ./garage
      dockerfile: Dockerfile.init
    restart: "no"
    depends_on:
      garage:
        condition: service_healthy
    environment:
      GARAGE_CONFIG_FILE: /config/garage.toml
      OBJECT_STORE_BUCKET: fishsense
      # Deterministic LOCAL TEST credentials (Garage requires hex-format
      # keys, so they look secret-shaped, but they're throwaway test
      # fixtures — not real and never used against prod). They must match
      # the worker/test env below + tests/_object_store_itest.py.
      OBJECT_STORE_ACCESS_KEY: GK31c2f3a4b5c6d7e8f9a0b1c2
      OBJECT_STORE_SECRET_KEY: "1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef"
    volumes:
      - garage_config:/config:ro
      - ./garage/bootstrap.sh:/bootstrap.sh:ro
      - garage_meta:/var/lib/garage/meta
    networks:
      - fishsense_local

  label-studio:
    # Pinned to a known-good OSS release that honors LABEL_STUDIO_USER_TOKEN
    # for legacy-API-token bootstrap. Unpin only after verifying that
    # programmatic admin-token boot still works on the new image — every
    # 1.x minor has slightly different bootstrap env-var semantics, and
    # losing programmatic boot would force UI-clicks back into setup.
    image: heartexlabs/label-studio:1.13.1
    restart: on-failure:15
    environment:
      # Disables the public signup form so the only account that exists is
      # the bootstrapped admin below. Tests never sign up, never click.
      LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_LINK: "true"
      # Admin user provisioned at first boot. The username/password let a
      # human log into the UI when debugging; tests use the fixed token
      # below and never need credentials.
      LABEL_STUDIO_USERNAME: admin@fishsense.local
      LABEL_STUDIO_PASSWORD: fishsense_local_admin
      # Fixed legacy API token for the admin user. Hard-coded here so the
      # integration test conftest can consume it directly — no
      # token-fetching round-trip, no shared secret outside the local
      # stack. SAFE because this image is never reachable outside the
      # devcontainer's internal network.
      LABEL_STUDIO_USER_TOKEN: fishsense_local_test_token_42
      # JSON logs make container logs greppable for failure diagnosis.
      JSON_LOG: "true"
    volumes:
      - label_studio_data:/label-studio/data
    ports:
      # Avoid clash with static_file_server (8080) and any host process
      # already on 8081. LS's default internal port is 8080 — only the
      # host-side mapping changes here.
      - "8082:8080"
    healthcheck:
      # LS exposes a cheap /health endpoint; we wait on it before tests
      # are allowed to run. First-time boot includes a SQLite migrate
      # which can take 30s+, so retries are generous.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - fishsense_local

  # NOTE: fishsense-api-workflow-worker is intentionally NOT in the default
  # local stack — even now that LS runs locally, its NAS credentials still
  # need to be wired before it'll boot cleanly. Bring it up manually with
  # `uv run` from the dev container, or refactor those activities to skip
  # cleanly when their backends are unset.

  fishsense-lite-web:
    # Mirrors the fishsense-api pattern: build from source so PR changes
    # are exercised, not a previously-published image.
    build:
      context: ..
      dockerfile: apps/fishsense-lite-web/Dockerfile
    restart: on-failure:15
    depends_on:
      - fishsense-api
      - label-studio
    environment:
      # fishsense-api in the local stack runs WITHOUT the prod authentik
      # middleware — the basic-auth header is parsed but never checked,
      # so any non-empty values satisfy env.ts's required-var validator.
      FISHSENSE_API_URL: http://fishsense-api:8000
      FISHSENSE_API_USERNAME: local
      FISHSENSE_API_PASSWORD: local
      LABEL_STUDIO_URL: http://label-studio:8080
      # Same fixed token as label-studio's LABEL_STUDIO_USER_TOKEN above.
      LABEL_STUDIO_API_KEY: fishsense_local_test_token_42
      # Placeholder Authentik / next-auth values. lib/env.ts throws on any
      # missing AUTH_* var the first time auth() is invoked, so /portal SSR
      # would crash with "Missing required env var" without these. We never
      # complete an actual OIDC flow against the local stack — the
      # integration test only asserts the signed-out redirect to
      # /api/auth/signin — so the secret + client values can be any
      # non-empty strings, and AUTH_AUTHENTIK_ISSUER just needs to parse as
      # a URL (next-auth doesn't reach out to it until a real sign-in
      # actually starts).
      AUTH_SECRET: fishsense_local_test_auth_secret_only_for_ci_v1
      AUTH_AUTHENTIK_ID: local-test-client-id
      AUTH_AUTHENTIK_SECRET: local-test-client-secret
      AUTH_AUTHENTIK_ISSUER: http://localhost:9999/local-test-issuer
      # Pin the canonical URL so next-auth doesn't fall back to deriving
      # it from the request's listen address (http://0.0.0.0:3000/...),
      # which would point browsers from the host at an unreachable URL
      # after sign-in. Prod sets the public hostname here; for the local
      # stack the container's published port on the host is the right
      # value.
      AUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    networks:
      - fishsense_local

  # `npm run dev` from inside the dev container is the iteration loop for
  # apps/fishsense-lite-web (hot reload, source maps). The fishsense-lite-web service above is
  # the production-shape image — exercised by integration.yml's smoke
  # check and available for end-to-end validation.

  # Workspace container the devcontainer attaches to. The data-processing
  # worker has no Dockerfile — we run it from here with `uv run` while
  # iterating, which is the whole point of this setup.
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_started
      temporal:
        condition: service_started
      fishsense-api:
        condition: service_started
      garage:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
      label-studio:
        condition: service_started
    environment:
      E4EFS_DOCKER: "false"
      # Default endpoints for tests + manual `uv run` invocations from inside
      # the dev container. Override per-shell as needed.
      FISHSENSE_API_URL: http://fishsense-api:8000
      FISHSENSE_TEMPORAL_HOST: temporal
      FISHSENSE_TEMPORAL_PORT: "7233"
      FISHSENSE_POSTGRES_HOST: postgres
      FISHSENSE_POSTGRES_PORT: "5432"
      FISHSENSE_POSTGRES_USER: postgres
      FISHSENSE_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fishsense_local}
      FISHSENSE_POSTGRES_DB: ${FISHSENSE_DB_NAME:-fishsense}
      # Garage object store — both workers read `[object_store]` from
      # these. Integration tests seed/read the same bucket. Creds match
      # the fixed key imported by `garage-init`. Path-style addressing is
      # required (set in object_store.build_s3_client).
      E4EFS_OBJECT_STORE__ENDPOINT_URL: http://garage:3900
      E4EFS_OBJECT_STORE__REGION: garage
      E4EFS_OBJECT_STORE__BUCKET: fishsense
      E4EFS_OBJECT_STORE__ACCESS_KEY: GK31c2f3a4b5c6d7e8f9a0b1c2
      E4EFS_OBJECT_STORE__SECRET_KEY: "1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef"
      # Label Studio endpoints for the api-workflow-worker integration tests.
      # Token must match LABEL_STUDIO_USER_TOKEN on the label-studio service.
      E4EFS_LABEL_STUDIO__URL: http://label-studio:8080
      E4EFS_LABEL_STUDIO__API_KEY: fishsense_local_test_token_42
    working_dir: ${HOST_REPO_PATH:?Set HOST_REPO_PATH in deploy/.env to the absolute path of this repo on your host (run "realpath .." from this directory).}
    # Give the in-container `vscode` user access to the host's docker socket
    # via supplementary group membership. The kernel only checks numeric GID,
    # so we don't need a matching named group inside the container — set
    # DOCKER_GID in deploy/.env to the host's docker group GID
    # (`getent group docker | cut -d: -f3`).
    group_add:
      - "${DOCKER_GID:?Set DOCKER_GID in deploy/.env (run 'getent group docker | cut -d: -f3' on your host).}"
    volumes:
      # Bind the repo at the SAME absolute path inside the container as on the
      # host. This makes any tool that keys state by absolute path (e.g.
      # Claude Code's per-project memory under ~/.claude/projects/<path-encoded>/)
      # see a single, consistent project key whether it runs from the host or
      # from inside the container. HOST_REPO_PATH lives in deploy/.env so each
      # developer can set it to wherever they cloned the repo.
      - ..:${HOST_REPO_PATH}:cached
      - dev_uv_cache:/home/vscode/.cache/uv
      # Share the host's Claude Code state (auth, settings, memory). Because
      # the workspace is bind-mounted at the same path inside the container as
      # on the host, the project-memory directory encoded by Claude Code is
      # identical on both sides — no symlink needed.
      - ${HOME}/.claude:/home/vscode/.claude
      # Mount the host's docker socket so the dev container can drive the
      # local stack itself. Paired with `group_add` above for socket access.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - fishsense_local

volumes:
  pg_data:
  garage_config:
  garage_meta:
  garage_data:
  dev_uv_cache:
  label_studio_data:

networks:
  fishsense_local:
    driver: bridge
